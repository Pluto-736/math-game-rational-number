<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* 输入显示（机器人上方） */

/* 键盘 */

.key {

/* ===== 结算页 ===== */

#over .title { font-size: 22px; color: var(--brick); text-shadow: 3px 3px 0 var(--ink); margin-bottom: 24px; }

<script>
/* ===================== 化简引擎 ===================== */
// 结构树：{op:'lit',v} | {op:'neg'|'pos'|'abs', x:node}
const Expr = {
  rnd(min, max){ return Math.floor(Math.random()*(max-min+1))+min; },
  pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; },

  // 生成一个式子。depth=1 单层；depth=2/3 多层
  gen(depth){
    const leaf = { op:'lit', v: this.rnd(1,9) };
    if(depth <= 1){
      const op = this.pick(['neg','pos','abs']);
      return { op, x: leaf };
    }
    // 多层：在内层结果外再包 1~2 层。整棵树最多只用一个 abs，
    // 避免出现 |..|..|| 这类难读的嵌套竖线。
    let node = leaf;
    const layers = depth; // 2 或 3
    let absUsed = false;
    for(let i=0;i<layers;i++){
      let choices = absUsed ? ['neg','pos','neg'] : ['neg','pos','abs','neg'];
      const op = this.pick(choices);
      if(op==='abs') absUsed = true;
      node = { op, x: node };
    }
    return node;
  },

  // 递归求值
  eval(node){
    if(node.op==='lit') return node.v;
    const v = this.eval(node.x);
    if(node.op==='neg') return -v;
    if(node.op==='pos') return v;
    if(node.op==='abs') return Math.abs(v);
    return v;
  },

  // 生成显示字符串（贴近课本写法：叶子/绝对值外不加多余括号）
  str(node){
    if(node.op==='lit') return String(node.v);
    const child = node.x;
    const inner = this.str(child);
    // 内层是数字或绝对值时，竖线/数字本身已是完整单元，负正号直接贴
    const bare = (child.op==='lit' || child.op==='abs');
    if(node.op==='neg') return bare ? '-'+inner : '-('+inner+')';
    if(node.op==='pos') return bare ? '+'+inner : '+('+inner+')';
    if(node.op==='abs') return '|'+inner+'|';
    return inner;
  },

  // 单层：从固定的「带绝对值或括号」形态里选，保证一定要化简一步，
  // 绝不出现裸的 -5 / +5（它们本身已是最简，等于白送）
  makeSingle(){
    const n = this.rnd(1,9);
    const forms = [
      { display:'|'+n+'|',    value:n  },   // |5|  → 5
      { display:'|-'+n+'|',   value:n  },   // |-5| → 5
      { display:'-(+'+n+')',  value:-n },   // -(+5)→ -5
      { display:'+(-'+n+')',  value:-n },   // +(-5)→ -5
      { display:'-('+n+')',   value:-n },   // -(5) → -5
      { display:'+('+n+')',   value:n  }    // +(5) → 5
    ];
    return this.pick(forms);
  },

  // 对外：产出 {display, value}，化简结果保证 |value|∈[1,9]
  make(multi){
    if(!multi) return this.makeSingle();
    // 多层：随机生成后兜底，若显示形式恰好等于答案（无需化简）则重生
    let node, v, display, tries=0;
    do {
      node = this.gen(this.rnd(2,3));
      v = this.eval(node);
      display = this.str(node);
      tries++;
    } while(display === String(v) && tries < 20);
    return { display, value: v };
  }
};

/* ===================== 8-bit 音频 ===================== */
const Audio8 = {
  ctx: null, muted: false, bgmTimer: null, bgmStep: 0,
  ensure(){
    if(!this.ctx){
      try { this.ctx = new (window.AudioContext||window.webkitAudioContext)(); }
      catch(e){ this.ctx = null; }
    }
    if(this.ctx && this.ctx.state==='suspended') this.ctx.resume();
  },
  beep(freq, dur, type, vol){
    if(this.muted || !this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type||'square';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime((vol||0.15), t);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t+dur);
  },
  slide(f1,f2,dur,type,vol){
    if(this.muted || !this.ctx) return;
    const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator(); const g=this.ctx.createGain();
    o.type=type||'square';
    o.frequency.setValueAtTime(f1,t);
    o.frequency.exponentialRampToValueAtTime(f2,t+dur);
    g.gain.setValueAtTime(vol||0.15,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t+dur);
  },
  fire(){ this.slide(880,1400,0.12,'square',0.12); },
  hit(){ this.slide(300,90,0.22,'square',0.18); this.beep(160,0.18,'triangle',0.15); },
  fail(){ this.beep(120,0.18,'sawtooth',0.12); },
  hurt(){ this.slide(400,80,0.4,'sawtooth',0.2); },
  gameover(){ const s=[392,330,262,196]; s.forEach((f,i)=>setTimeout(()=>this.beep(f,0.3,'square',0.18),i*180)); },
  key(){ this.beep(660,0.05,'square',0.08); },
  // 简单循环 BGM（方波琶音）
  startBGM(){
    if(this.bgmTimer) return;
    const notes = [262,330,392,330, 294,349,440,349, 262,330,392,523, 392,330,294,262];
    this.bgmStep = 0;
    this.bgmTimer = setInterval(()=>{
      if(this.muted || !this.ctx){ return; }
      const f = notes[this.bgmStep % notes.length];
      this.beep(f, 0.16, 'square', 0.05);
      // 低音
      if(this.bgmStep%2===0) this.beep(f/2, 0.18, 'triangle', 0.05);
      this.bgmStep++;
    }, 220);
  },
  stopBGM(){ if(this.bgmTimer){ clearInterval(this.bgmTimer); this.bgmTimer=null; } },
  toggle(){
    this.muted = !this.muted;
    document.getElementById('muteBtn').textContent = this.muted ? '🔇' : '🔊';
  }
};

/* 像素炮手（用 emoji 占位的像素风小人，外加像素帽） */
const CANNON_SVG = '🤖';

/* ===================== 战绩纪念卡（像素风·纯canvas） ===================== */
const ResultCard = {
  // 按击落数分档：<8 铜 / 8-16 银 / >=17 金
  tierOf(kills){
    if(kills >= 17) return 2;
    if(kills >= 8)  return 1;
    return 0;
  },
  TITLES: ['数字新兵', '白银老兵', '王牌炮手'],
  // 勋章配色（暗/主/亮）
  MEDALS: [
    { dark:'#7a4a1a', main:'#c8792e', lite:'#f0b070', label:'铜' },
    { dark:'#707888', main:'#b8c0cc', lite:'#eef2f8', label:'银' },
    { dark:'#a07800', main:'#fcd000', lite:'#fff3a0', label:'金' }
  ],
  BLESS: [
    ['稳住准心，一发入魂！', '新兵也有大将之风，继续练！'],
    ['连消带打，弹无虚发！', '老兵手感火热，再上一层楼！'],
    ['神乎其技，弹幕退散！', '王牌炮手，全场无一漏网！']
  ],

  px(g, x, y, w, h, color){ g.fillStyle = color; g.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h)); },

  // 像素描边矩形（外深内亮的立体块感）
  block(g, x, y, w, h, main, dark, lite){
    this.px(g, x, y, w, h, dark);
    this.px(g, x+4, y+4, w-8, h-8, main);
    this.px(g, x+4, y+4, w-8, 4, lite);      // 上高光
    this.px(g, x+4, y+4, 4, h-8, lite);      // 左高光
  },

  // 像素勋章：八角奖章 + 星星 + 缎带
  medal(g, cx, cy, r, m){
    // 缎带
    this.px(g, cx-14, cy+r-6, 10, 30, m.dark);
    this.px(g, cx+4,  cy+r-6, 10, 30, m.dark);
    this.px(g, cx-12, cy+r-6, 6, 26, m.main);
    this.px(g, cx+6,  cy+r-6, 6, 26, m.main);
    // 奖章主体（用同心方阶近似圆）
    const steps = [ [r,10],[r-6,4],[r-10,4] ];
    this.px(g, cx-r, cy-r+6, r*2, r*2-12, m.dark);
    this.px(g, cx-r+6, cy-r, r*2-12, r*2, m.dark);
    this.px(g, cx-r+3, cy-r+9, r*2-6, r*2-18, m.main);
    this.px(g, cx-r+9, cy-r+3, r*2-18, r*2-6, m.main);
    // 高光
    this.px(g, cx-r+9, cy-r+9, 8, 8, m.lite);
    // 中央星星（用字体绘制，居中）
    g.save();
    g.textAlign='center'; g.textBaseline='middle';
    g.fillStyle = m.dark;
    g.font = Math.round(r*1.1)+'px serif';
    g.fillText('★', cx+1, cy+1);
    g.fillStyle = m.lite;
    g.fillText('★', cx, cy);
    g.restore();
  },

  // 像素炮手机器人：中间机器人，左右各一根朝上的炮管
  robot(g, cx, baseY){
    const P = (x,y,w,h,c)=>this.px(g,x,y,w,h,c);
    // 炮台基座（砖红台阶）
    P(cx-46, baseY, 92, 12, '#7a2a00');
    P(cx-46, baseY, 92, 4, '#e06a2a');
    P(cx-34, baseY-9, 68, 11, '#7a2a00');
    P(cx-34, baseY-9, 68, 4, '#c84c0c');
    // 左右朝上的炮管（深灰管身+金口+高光）
    [[-40,-1],[28,1]].forEach(([ox])=>{
      const bx = cx+ox;
      P(bx, baseY-42, 12, 40, '#3a3a4a');   // 管身
      P(bx, baseY-42, 4, 40, '#5a5a70');    // 左高光
      P(bx-2, baseY-46, 16, 8, '#fcd000');  // 炮口
      P(bx-2, baseY-46, 16, 3, '#fff3a0');  // 炮口高光
    });
    // 机器人本体（emoji，够可爱又统一）
    g.save();
    g.textAlign='center'; g.textBaseline='alphabetic';
    g.font='68px serif';
    g.fillText('🤖', cx, baseY-10);
    g.restore();
  },

  render(opts){
    const { tier, sec, kills, maxCombo, score } = opts;
    const m = this.MEDALS[tier];
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    const W = 480, H = 620;
    const cv = document.createElement('canvas');
    cv.width = W*dpr; cv.height = H*dpr;
    const g = cv.getContext('2d');
    g.scale(dpr, dpr);
    g.imageSmoothingEnabled = false;
    g.textAlign = 'center';

    // 背景：天空渐变 + 草地（呼应游戏页）
    const sky = g.createLinearGradient(0,0,0,H);
    sky.addColorStop(0, '#5c94fc'); sky.addColorStop(0.62,'#6ba8ff');
    sky.addColorStop(0.62,'#00a800'); sky.addColorStop(1,'#008800');
    g.fillStyle = sky; g.fillRect(0,0,W,H);
    // 像素云
    g.fillStyle = 'rgba(255,255,255,0.85)';
    [[70,90,44],[360,140,54],[300,70,36]].forEach(([x,y,w])=>{
      g.fillRect(x,y,w,14); g.fillRect(x+10,y-8,w-20,10);
    });

    // 外像素边框（金色双层）
    this.px(g, 0,0,W,10,'#a07800'); this.px(g,0,H-10,W,10,'#a07800');
    this.px(g, 0,0,10,H,'#a07800'); this.px(g,W-10,0,10,H,'#a07800');
    this.px(g, 10,10,W-20,4,'#fcd000'); this.px(g,10,H-14,W-20,4,'#fcd000');
    this.px(g, 10,10,4,H-20,'#fcd000'); this.px(g,W-14,10,4,H-20,'#fcd000');

    g.fillStyle = '#fff';
    g.font = "24px 'Press Start 2P', monospace";
    g.save(); g.shadowColor='#0a0a1a'; g.shadowOffsetX=3; g.shadowOffsetY=3;
    g.fillText('化简大作战', W/2, 62);
    g.font = "13px 'Press Start 2P', monospace";
    g.fillStyle = '#fcd000';
    g.fillText('战 绩 纪 念 卡', W/2, 94);
    g.restore();

    // 机器人 + 勋章
    this.robot(g, W/2 - 100, 258);
    this.medal(g, W/2 + 100, 214, 50, m);

    // 称号药丸
    const honor = this.TITLES[tier];
    g.font = "18px 'Press Start 2P', monospace";
    const pw = g.measureText(honor).width + 52;
    this.block(g, (W-pw)/2, 296, pw, 52, m.main, m.dark, m.lite);
    g.fillStyle = tier===1 ? '#0a0a1a' : '#fff';
    g.save(); g.textBaseline='middle';
    g.fillText(honor, W/2, 323);
    g.restore();

    // 祝福语两行
    const bless = this.BLESS[tier];
    g.fillStyle = '#fff';
    g.font = "12px 'Press Start 2P', monospace";
    g.save(); g.shadowColor='#0a0a1a'; g.shadowOffsetX=2; g.shadowOffsetY=2;
    g.fillText(bless[0], W/2, 382);
    g.fillText(bless[1], W/2, 410);
    g.restore();

    // 数据面板（深底像素框）
    const px0 = 44, pw0 = W-88, py0 = 434, ph0 = 156;
    this.px(g, px0, py0, pw0, ph0, '#0a0a1a');
    this.px(g, px0+4, py0+4, pw0-8, ph0-8, 'rgba(255,255,255,0.08)');
    const rows = [
      ['坚持时长', sec + ' 秒'],
      ['击落方块', kills + ' 个'],
      ['最高连击', maxCombo + ' 连'],
      ['总得分',   score + ' 分']
    ];
    g.font = "13px 'Press Start 2P', monospace";
    g.textBaseline = 'middle';
    rows.forEach((r,i)=>{
      const ry = py0 + 28 + i*34;
      g.fillStyle = '#a8c8ff';
      g.textAlign = 'left';
      g.fillText(r[0], px0+22, ry);
      g.fillStyle = '#fcd000';
      g.textAlign = 'right';
      g.fillText(r[1], px0+pw0-22, ry);
    });
    g.textAlign = 'center';

    // 尾注
    g.fillStyle = 'rgba(255,255,255,0.7)';
    g.font = "9px 'Press Start 2P', monospace";
    g.fillText('✧ 再战一局，冲击王牌炮手 ✧', W/2, H-24);

    return cv;
  },

  build(g_stats, done){
    const cv = this.render(g_stats);
    let url;
    try { url = cv.toDataURL('image/png'); } catch(e){ url = ''; }
    const img = document.getElementById('overCard');
    if(url) img.src = url;
    if(done) done();
  }
};

/* ===================== 游戏主体 ===================== */
const Game = {
  lives:3, score:0, combo:0, maxCombo:0, kills:0,
  mobs:[], bullets:[], falling:null,
  input:{ neg:false, digit:null },
  running:false, raf:0,
  startT:0, elapsed:0,
  spawnAcc:0, lastTs:0,
  groundY:0, _cannonBound:false,
  BH:44, GAP:2, TOPLIMIT:34,

  start(){
    Audio8.ensure();
    Audio8.startBGM();
    this.lives=3; this.score=0; this.combo=0; this.maxCombo=0; this.kills=0;
    this.mobs=[]; this.bullets=[]; this.falling=null;
    this.input={neg:false,digit:null};
    this.startT=performance.now(); this.elapsed=0;
    this.spawnAcc=0; this.lastTs=this.startT;
    this.running=true;
    UI.hideHelp();
    UI.show('game');
    const pf=document.getElementById('playfield');
    pf.querySelectorAll('.mob,.bullet,.boom').forEach(e=>e.remove());
    this.groundY = pf.clientHeight - 210;
    const cannon=document.getElementById('cannon');
    cannon.textContent = CANNON_SVG;
    cannon.style.fontSize='48px';
    if(!this._cannonBound){
      cannon.addEventListener('click', ()=>this.fire());
      cannon.addEventListener('touchstart', e=>{ e.preventDefault(); this.fire(); }, {passive:false});
      this._cannonBound=true;
    }
    this.buildKeypad();
    this.updateInputDisplay();
    this.updateHud();
    this.spawn();
    cancelAnimationFrame(this.raf);
    this.raf = requestAnimationFrame(ts=>this.loop(ts));
  },

  stop(){ this.running=false; cancelAnimationFrame(this.raf); },

  // ---- 难度参数（随存活时间递增）----
  diff(){
    const t = this.elapsed; // 秒
    return {
      speed: 150 + t*4,            // 下落速度 px/秒，开局150，后期缓慢加速
      multi: this.kills >= 4       // 击落4个后出多层
    };
  },

  // ---- 生成一个从顶部落下的方块（一次只有一个在下落，天然不重叠）----
  spawn(){
    const pf=document.getElementById('playfield');
    const W=pf.clientWidth;
    const m = Expr.make(this.diff().multi);
    const el=document.createElement('div');
    el.className='mob';
    el.textContent=m.display;
    el.style.top='-30px';
    pf.appendChild(el);
    const w = el.offsetWidth || 56;
    const pad = w/2 + 6;
    const x = Expr.rnd(Math.round(pad), Math.round(W-pad));
    el.style.left=x+'px'; el.style.top='-30px';
    this.falling = { el, x, y:-30, w, value:m.value, display:m.display, landed:false };
  },

  // 某方块在当前堆叠下的「落点中心 y」：落到地面或最上方障碍物之上
  restY(block){
    let r = this.groundY - this.BH/2;
    for(const b of this.mobs){
      if(b===block || !b.landed) continue;
      if(Math.abs(b.x - block.x) < (b.w + block.w)/2 - 4 && b.y > block.y){
        r = Math.min(r, b.y - this.BH - this.GAP);
      }
    }
    return r;
  },

  // 摧毁方块后，让上方悬空的方块受重力下沉填补
  settle(){
    const landed = this.mobs.filter(m=>m.landed).sort((a,b)=> b.y - a.y); // 底部先处理
    for(const m of landed){
      const ry = this.restY(m);
      if(ry > m.y + 0.5){ m.y = ry; m.el.style.top = m.y+'px'; }
    }
  },

  // ---- 键盘 ----
  buildKeypad(){
    const kp=document.getElementById('keypad');
    kp.innerHTML='';
    const keys=['-','1','2','3','4','5','6','7','8','9','0'];
    keys.forEach(k=>{
      const b=document.createElement('button');
      b.className='key'+(k==='-'?' neg':'');
      b.textContent=k;
      b.onclick=()=>this.tapKey(k,b);
      kp.appendChild(b);
    });
  },

  tapKey(k, btn){
    Audio8.key();
    if(k==='-'){
      this.input.neg=!this.input.neg;
      btn.classList.toggle('on', this.input.neg);
    } else {
      const d=parseInt(k);
      document.querySelectorAll('#keypad .key').forEach(el=>{
        if(el.textContent!=='-') el.classList.remove('on');
      });
      if(this.input.digit===d){ this.input.digit=null; } // 再点取消
      else { this.input.digit=d; btn.classList.add('on'); }
    }
    this.updateInputDisplay();
  },

  updateInputDisplay(){
    const el=document.getElementById('inputDisplay');
    if(this.input.digit===null && !this.input.neg){ el.textContent=''; return; }
    const sign=this.input.neg?'-':'';
    const d=this.input.digit===null?'':this.input.digit;
    el.textContent=sign+d;
  },

  clearInput(){
    this.input={neg:false,digit:null};
    document.querySelectorAll('#keypad .key').forEach(el=>el.classList.remove('on'));
    this.updateInputDisplay();
  },

  // 当前屏上所有方块（含正在下落的）
  allBlocks(){
    const arr = this.mobs.slice();
    if(this.falling) arr.push(this.falling);
    return arr;
  },

  // ---- 发射判定：点机器人触发 ----
  fire(){
    if(!this.running) return;
    if(this.input.digit===null){ Audio8.fail(); this.flashNoTarget(); return; }
    const val = (this.input.neg?-1:1)*this.input.digit;
    // 屏上有对应数值的方块 → 打最下面那个；否则算错
    const matches = this.allBlocks().filter(m=>m.value===val);
    if(matches.length===0){
      this.miss();   // 复位 + 扣血
      return;
    }
    matches.sort((a,b)=> b.y - a.y);     // y 最大 = 最下面
    Audio8.fire();
    this.shootBullet(matches[0], val);
    this.clearInput();
  },

  // 算错：按键复位并扣血
  miss(){
    Audio8.fail();
    this.flashNoTarget();
    this.clearInput();
    this.combo=0;
    this.lives--;
    Audio8.hurt();
    const cannon=document.getElementById('cannon');
    cannon.style.filter='brightness(2) sepia(1) hue-rotate(-30deg)';
    setTimeout(()=>{ cannon.style.filter=''; },200);
    this.updateHud();
    if(this.lives<=0) this.gameOver();
  },

  flashNoTarget(){
    const el=document.getElementById('inputDisplay');
    el.style.color='#ff4040';
    setTimeout(()=>el.style.color='', 250);
  },

  shootBullet(mob, val){
    const pf=document.getElementById('playfield');
    const cannon=document.getElementById('cannon');
    const cx=cannon.offsetLeft, cy=cannon.offsetTop;
    const b=document.createElement('div');
    b.className='bullet';
    b.textContent=(val>0?'+':'')+val;
    b.style.left=cx+'px'; b.style.top=cy+'px';
    pf.appendChild(b);
    this.bullets.push({ el:b, x:cx, y:cy, target:mob, val });
    cannon.style.transform='translateX(-50%) scale(1.15)';
    setTimeout(()=>cannon.style.transform='translateX(-50%) scale(1)',90);
  },

  boom(x,y){
    const pf=document.getElementById('playfield');
    const e=document.createElement('div');
    e.className='boom'; e.textContent='💥';
    e.style.left=x+'px'; e.style.top=y+'px';
    pf.appendChild(e);
    setTimeout(()=>e.remove(),500);
  },

  destroyMob(mob){
    this.boom(mob.x, mob.y);
    Audio8.hit();
    this.kills++;
    this.combo++; if(this.combo>this.maxCombo) this.maxCombo=this.combo;
    this.score += 10 + Math.max(0,(this.combo-1))*2;
    mob.el.remove();
    if(mob===this.falling){ this.falling=null; this.spawn(); }
    this.mobs = this.mobs.filter(m=>m!==mob);
    this.settle();
    this.updateHud();
  },

  // ---- 主循环 ----
  loop(ts){
    if(!this.running) return;
    const dt=Math.min(50, ts-this.lastTs)/1000; // 秒
    this.lastTs=ts;
    this.elapsed=(ts-this.startT)/1000;
    const d=this.diff();

    const pf=document.getElementById('playfield');

    // 下落中的方块
    if(this.falling){
      const f=this.falling;
      f.y += d.speed*dt;
      const ry=this.restY(f);
      if(f.y >= ry){
        f.y = ry;
        f.el.style.top = f.y+'px';
        f.landed = true;
        f.el.classList.add('landed');
        this.mobs.push(f);
        this.falling=null;
        // 垒到顶部 → 结束
        if(ry - this.BH/2 < this.TOPLIMIT){ this.gameOver(); return; }
        this.spawn();
      } else {
        f.el.style.top = f.y+'px';
      }
    }

    // 炮弹朝目标飞
    for(const b of [...this.bullets]){
      if(!b.target || !b.target.el.isConnected){
        b.el.remove(); this.bullets=this.bullets.filter(x=>x!==b); continue;
      }
      const tx=b.target.x, ty=b.target.y;
      const dx=tx-b.x, dy=ty-b.y; const dist=Math.hypot(dx,dy);
      const bs=640*dt;
      if(dist < 26){
        this.destroyMob(b.target);
        b.el.remove(); this.bullets=this.bullets.filter(x=>x!==b);
        continue;
      }
      b.x += dx/dist*bs; b.y += dy/dist*bs;
      b.el.style.left=b.x+'px'; b.el.style.top=b.y+'px';
    }

    this.raf=requestAnimationFrame(t=>this.loop(t));
  },

  updateHud(){
    const h=document.getElementById('hearts');
    h.innerHTML='';
    for(let i=0;i<3;i++){
      const s=document.createElement('span');
      s.textContent='❤';
      if(i>=this.lives) s.className='lost';
      h.appendChild(s);
    }
    document.getElementById('scoreLbl').textContent=this.score+' 分';
    document.getElementById('comboLbl').textContent=this.combo>1?(this.combo+' 连击'):'';
  },

  gameOver(){
    this.stop();
    Audio8.stopBGM();
    Audio8.gameover();
    const sec=Math.round(this.elapsed);
    const tier=ResultCard.tierOf(this.kills);
    ResultCard.build({ tier, sec, kills:this.kills, maxCombo:this.maxCombo, score:this.score });
    setTimeout(()=>UI.show('over'), 400);
  }
};
