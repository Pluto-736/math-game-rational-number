<title>立体几何工坊</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--line:#7fd0ff;--ink:#eaf6ff;--glow:#ffd34d;--good:#4ade80;--muted:#8fb4d6}
html,body{min-height:100%;font-family:'Microsoft YaHei',Arial,sans-serif;color:var(--ink);touch-action:manipulation}
body{min-height:100vh;background:
  linear-gradient(rgba(120,180,255,.08) 1px,transparent 1px) 0 0/30px 30px,
  linear-gradient(90deg,rgba(120,180,255,.08) 1px,transparent 1px) 0 0/30px 30px,
  radial-gradient(circle at 18% 10%,rgba(80,150,240,.25),transparent 42%),
  radial-gradient(circle at 85% 8%,rgba(250,204,21,.12),transparent 34%),
  linear-gradient(180deg,#0a1c33,#0b2038 60%,#0e2949);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 18px}
.logo{font-size:58px;filter:drop-shadow(0 8px 12px rgba(0,0,0,.4));animation:float 2.8s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-9px)}}
.title{font-size:32px;font-weight:1000;color:var(--glow);letter-spacing:2px;text-shadow:0 3px 0 #a8760a;margin:8px 0 3px;text-align:center}
.sub{font-size:13.5px;color:var(--muted);text-align:center;line-height:1.7;max-width:400px;margin-bottom:22px}
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:420px}
.card{display:flex;align-items:center;gap:15px;background:rgba(8,22,45,.65);border:2px solid rgba(127,208,255,.24);
  border-radius:20px;padding:17px 18px;text-decoration:none;color:var(--ink);
  transition:transform .18s,background .18s,border-color .18s;box-shadow:0 8px 22px rgba(0,0,0,.28)}
.card:hover{transform:translateY(-3px) scale(1.02);background:rgba(15,40,75,.8);border-color:rgba(127,208,255,.5)}
.card:active{transform:scale(.98)}
.card .emo{font-size:40px;flex-shrink:0;width:58px;text-align:center;filter:drop-shadow(0 3px 5px rgba(0,0,0,.4))}
.card .info{flex:1}
.card .name{font-size:19px;font-weight:900;color:var(--line);margin-bottom:3px}
.card .desc{font-size:12.5px;color:#cfe8ff;line-height:1.5;opacity:.92}
.card .tag{display:inline-block;font-size:11px;background:rgba(250,204,21,.16);color:var(--glow);
  padding:2px 9px;border-radius:9px;margin-top:6px;font-weight:700}
.foot{margin-top:26px;font-size:12.5px;color:var(--muted)}
.foot a{color:var(--line);text-decoration:none}
.note{margin-top:12px;font-size:11.5px;color:rgba(143,180,214,.7);text-align:center;max-width:380px;line-height:1.6}
</style>

<body>
  <div class="logo">🏗️</div>
  <div class="title">立体几何工坊</div>
  <div class="sub">小小建筑师，动手玩转立体图形！<br>折纸盒、照图搭建、画三视图，三种玩法练透空间想象。</div>

  <div class="cards">
    <a class="card" href="read.html">
      <div class="emo">✏️</div>
      <div class="info">
        <div class="name">画三视图</div>
        <div class="desc">看一个搭好的立体（可旋转），把它的正面、左面、上面视图一个个画出来。</div>
        <span class="tag">三视图 · 由形画图</span>
      </div>
    </a>
    <a class="card" href="build.html">
      <div class="emo">🧱</div>
      <div class="info">
        <div class="name">照图搭建</div>
        <div class="desc">给你正面、左面、上面三张视图，在网格上垒小方块，把立体还原出来。</div>
        <span class="tag">三视图 · 由图搭形</span>
      </div>
    </a>
    <a class="card" href="fold.html">
      <div class="emo">📐</div>
      <div class="info">
        <div class="name">折叠工坊</div>
        <div class="desc">拖动滑杆让展开图在原地折起来，看它能不能拼成正方体。折不成的会撞车变红。</div>
        <span class="tag">展开与折叠</span>
      </div>
    </a>
  </div>

  <div class="foot"><a href="../index.html">← 返回数学游戏厅</a></div>
  <div class="note">💡 3D 引擎已内置，无需联网，打开即玩。</div>
</body>
</html>
