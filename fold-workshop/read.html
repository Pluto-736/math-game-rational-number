<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>建筑工坊 · 画三视图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--line:#7fd0ff;--ink:#eaf6ff;--glow:#ffd34d;--good:#4ade80;--bad:#fb5a6a;--muted:#8fb4d6}
html,body{height:100%;overflow:hidden;font-family:'Microsoft YaHei',Arial,sans-serif;color:var(--ink);user-select:none;touch-action:none}
body{background:
  linear-gradient(rgba(120,180,255,.07) 1px,transparent 1px) 0 0/30px 30px,
  linear-gradient(90deg,rgba(120,180,255,.07) 1px,transparent 1px) 0 0/30px 30px,
  radial-gradient(circle at 20% 8%,rgba(80,150,240,.2),transparent 42%),
  linear-gradient(180deg,#0a1c33,#0b2038 60%,#0e2949)}
#app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center}
.top{width:100%;max-width:540px;padding:10px 16px 2px;text-align:center;z-index:5}
.top h1{font-size:19px;letter-spacing:.5px;color:var(--line);text-shadow:0 2px 0 #0a3057}
.top .sub{font-size:12px;color:var(--muted);margin-top:2px}
/* 进度：三个视图 */
.steps{display:flex;gap:10px;justify-content:center;margin-top:7px}
.step{font-size:12px;color:var(--muted);padding:3px 10px;border-radius:11px;background:rgba(255,255,255,.06);font-weight:700}
.step.now{color:#06203b;background:var(--glow)}
.step.done{color:var(--good);background:rgba(74,222,128,.15)}
.markHint{display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;color:var(--muted);margin-top:5px}
.markHint .swatch{display:inline-block;width:16px;height:5px;border-radius:2px;background:#facc15}

#cv{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1}
.stageSpace{flex:1;min-height:120px}

.panel{position:relative;z-index:5;width:100%;display:flex;flex-direction:column;align-items:center;margin-top:auto;padding-bottom:calc(8px + env(safe-area-inset-bottom))}
.tip{min-height:22px;font-size:14px;color:#ffe9a8;text-align:center;font-weight:800;line-height:1.5;padding:0 16px;margin-bottom:6px}
.draw-wrap{text-align:center}
.draw-lab{font-size:12px;color:var(--muted);margin-bottom:5px}
.dgrid{display:grid;grid-template-columns:repeat(3,46px);grid-auto-rows:46px;gap:5px;
  background:rgba(8,22,45,.55);padding:9px;border-radius:14px;border:1.5px solid rgba(127,208,255,.22)}
.dgrid .dc{background:rgba(255,255,255,.08);border:1.5px solid rgba(127,208,255,.25);border-radius:8px;cursor:pointer}
.dgrid .dc:active{transform:scale(.92)}
.dgrid .dc.on{background:var(--line);border-color:#dbeafe}
.dgrid .dc.err{background:var(--bad);border-color:#fff}
.dgrid .dc.miss{background:rgba(74,222,128,.25);border:2px dashed var(--good)}
.builder{display:flex;gap:16px;align-items:center;justify-content:center}
.actions{display:flex;flex-direction:column;gap:8px}
.btn{border:0;border-radius:13px;padding:11px 18px;font:900 14px inherit;cursor:pointer;color:#06203b;background:linear-gradient(#fff0a0,var(--glow));box-shadow:0 5px 0 #b78300}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 #b78300}
.btn.ghost{background:rgba(255,255,255,.13);color:var(--ink);box-shadow:0 5px 0 rgba(0,0,0,.3)}
.foot{font-size:11.5px;color:var(--muted);margin-top:8px}
.foot a{color:var(--line);text-decoration:none}
.home-btn{position:absolute;left:12px;top:calc(10px + env(safe-area-inset-top));z-index:8;
  border:0;background:rgba(255,255,255,.13);color:var(--ink);border-radius:11px;padding:7px 11px;font-size:16px;cursor:pointer}
.home-btn:active{transform:scale(.92)}
.snd-btn{position:absolute;right:12px;top:calc(10px + env(safe-area-inset-top));z-index:8;
  border:0;background:rgba(255,255,255,.13);color:var(--ink);border-radius:11px;padding:7px 11px;font-size:16px;cursor:pointer}
.snd-btn:active{transform:scale(.92)}
.err{position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;padding:30px;z-index:20;color:#ffd0d6;font-size:14px;line-height:1.8}
.banner{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%) scale(.8);opacity:0;
  background:rgba(7,20,40,.95);border:2px solid var(--good);border-radius:18px;padding:18px 26px;text-align:center;z-index:15;transition:.3s;pointer-events:none}
.banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.banner h2{color:var(--good);font-size:22px;margin-bottom:4px}
.banner p{font-size:13px;color:#cfe8ff}
.overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:30;
  background:rgba(4,12,26,.72);backdrop-filter:blur(2px)}
.overlay.show{display:flex}
.ov-card{background:linear-gradient(180deg,#0e2949,#0a1c33);border:2px solid var(--good);border-radius:20px;
  padding:26px 30px;text-align:center;max-width:320px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.ov-emo{font-size:52px;margin-bottom:6px}
.ov-card h2{color:var(--good);font-size:22px;margin-bottom:6px}
.ov-card p{color:#cfe8ff;font-size:13px;line-height:1.6;margin-bottom:18px}
.ov-btns{display:flex;flex-direction:column;gap:10px}
</style>
</head>
<body>
<div id="app">
  <button class="home-btn" onclick="location.href='index.html'">🏠</button>
  <button class="snd-btn" id="sndBtn" onclick="Audio8.toggle()">🔊</button>
  <div class="top">
    <h1>🏗️ 建筑工坊 <span style="font-size:11px;color:var(--muted)">画三视图</span></h1>
    <div class="sub">观察上面的立体（可拖动旋转），把它的三视图一个个画出来</div>
    <div class="steps" id="steps">
      <div class="step" id="s0">正面看</div>
      <div class="step" id="s1">左面看</div>
      <div class="step" id="s2">上面看</div>
    </div>
    <div class="markHint"><span class="swatch"></span>黄边所对的方向就是「正面」</div>
  </div>

  <canvas id="cv"></canvas>
  <div class="stageSpace"></div>

  <div class="panel">
    <div class="tip" id="tip"></div>
    <div class="builder">
      <div class="draw-wrap">
        <div class="draw-lab" id="drawLab">画「正面看」到的形状</div>
        <div class="dgrid" id="dgrid"></div>
      </div>
      <div class="actions">
        <button class="btn ghost" onclick="R.rotateHint()">↺ 转一转</button>
        <button class="btn ghost" onclick="R.clearDraw()">清空</button>
        <button class="btn" onclick="R.confirm()" id="okBtn">确定</button>
      </div>
    </div>
    <div class="foot">关卡 <b id="lvNo">1</b> · 得分 <b id="score">0</b></div>
  </div>

  <div class="banner" id="banner"><h2>✅ 三视图全对！</h2><p>这个立体你看透了</p></div>
  <div class="err" id="err">⚠️ 3D 引擎（Three.js）没能加载。<br>请确认 lib 文件夹和本页面放在一起，然后刷新重试。</div>

  <div class="overlay" id="overlay">
    <div class="ov-card">
      <div class="ov-emo">🎉</div>
      <h2>8 关全部完成！</h2>
      <p>每个立体的三视图你都画对了，太厉害了。</p>
      <div class="ov-btns">
        <button class="btn" onclick="R.again()">↺ 再来一局</button>
        <button class="btn ghost" onclick="location.href='index.html'">🏠 回主页</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ============ 音频：WebAudio 现场生成的欢快BGM + 音效（无需外部文件，微信可用） ============ */
const Audio8=(function(){
  let ctx,master,musicGain,on=true,playing=false,timer=null,step=0,nextT=0;
  const SPB=0.2;
  const MEL=[392.00,523.25,659.25,523.25,587.33,659.25,783.99,659.25,
             523.25,659.25,587.33,523.25,440.00,392.00,440.00,523.25];
  const BASS=[130.81,196.00,174.61,196.00];
  function init(){
    if(ctx)return;
    const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
    ctx=new AC();
    master=ctx.createGain();master.gain.value=0.9;master.connect(ctx.destination);
    musicGain=ctx.createGain();musicGain.gain.value=0.16;musicGain.connect(master);
  }
  function tone(freq,dur,type,dest,vol,when){
    const t=when||ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(vol||0.25,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(dest||master);o.start(t);o.stop(t+dur+0.03);
  }
  function schedule(){
    if(!ctx)return;
    while(nextT<ctx.currentTime+0.25){
      const i=step%MEL.length;
      tone(MEL[i],SPB*0.95,'triangle',musicGain,0.22,nextT);
      if(step%4===0)tone(BASS[(step/4)%BASS.length],SPB*3.5,'sine',musicGain,0.30,nextT);
      nextT+=SPB;step++;
    }
  }
  function startMusic(){
    if(!ctx||playing||!on)return;playing=true;nextT=ctx.currentTime+0.05;
    timer=setInterval(schedule,60);schedule();
  }
  function stopMusic(){playing=false;if(timer){clearInterval(timer);timer=null;}}
  const sfx={
    click(){if(ctx&&on)tone(880,0.06,'square',master,0.18);},
    pop(){if(ctx&&on){tone(660,0.05,'square',master,0.18);tone(990,0.07,'square',master,0.16,ctx.currentTime+0.05);}},
    correct(){if(!ctx||!on)return;const t=ctx.currentTime;[523.25,659.25,783.99].forEach((f,k)=>tone(f,0.16,'triangle',master,0.28,t+k*0.09));},
    wrong(){if(!ctx||!on)return;const t=ctx.currentTime;tone(311.13,0.16,'sawtooth',master,0.22,t);tone(233.08,0.22,'sawtooth',master,0.22,t+0.14);},
    clash(){if(!ctx||!on)return;const t=ctx.currentTime;tone(150,0.18,'square',master,0.30,t);tone(90,0.22,'sawtooth',master,0.26,t+0.02);},
    snap(){if(!ctx||!on)return;const t=ctx.currentTime;tone(784,0.1,'triangle',master,0.26,t);tone(1046.5,0.14,'triangle',master,0.24,t+0.08);},
    win(){if(!ctx||!on)return;const t=ctx.currentTime;[523.25,659.25,783.99,1046.5,783.99,1046.5].forEach((f,k)=>tone(f,0.22,'triangle',master,0.30,t+k*0.11));}
  };
  function ensure(){init();if(ctx&&ctx.state==='suspended')ctx.resume();if(on)startMusic();}
  function toggle(){on=!on;if(on){ensure();}else{stopMusic();}
    const b=document.getElementById('sndBtn');if(b)b.textContent=on?'🔊':'🔇';return on;}
  const unlock=()=>{ensure();};
  ['pointerdown','touchstart','keydown'].forEach(ev=>addEventListener(ev,unlock,{once:true,passive:true}));
  return {ensure,toggle,sfx,isOn:()=>on};
})();
</script>
<script src="lib/three.min.js"></script>
<script>
/* ============ 关卡（沿用 build.html 坐标：r=前后,c=左右,值=高0..3；r=2 靠正面，即金色标记一侧） ============ */
/* ============ 随机立体生成器（与 build.html 同一套：三档递进+连通+去重+难档遮挡） ============ */
/* 坐标：h[r][c] r=前后（r=2 靠正面，r=0 为背面） c=左右 值=高0..3 */
const N=3, MAXH=3, ROUND=8;
const rnd=n=>Math.floor(Math.random()*n);
const sig=h=>h.map(r=>r.join('')).join('|');
function connectedCells(cells){
  const all=[];for(let r=0;r<N;r++)for(let c=0;c<N;c++)all.push([r,c]);
  const start=all[rnd(all.length)];
  const chosen=[start],inSet=new Set([start[0]+','+start[1]]);
  while(chosen.length<cells){
    const frontier=[];
    chosen.forEach(([r,c])=>[[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{
      const nr=r+dr,nc=c+dc,k=nr+','+nc;
      if(nr>=0&&nr<N&&nc>=0&&nc<N&&!inSet.has(k))frontier.push([nr,nc,k]);
    }));
    if(!frontier.length)break;
    const pick=frontier[rnd(frontier.length)];
    chosen.push([pick[0],pick[1]]);inSet.add(pick[2]);
  }
  return chosen;
}
function randSolid(cells,maxH,occ){
  for(let tries=0;tries<40;tries++){
    const cs=connectedCells(cells);
    const h=[[0,0,0],[0,0,0],[0,0,0]];
    cs.forEach(([r,c])=>{h[r][c]=1+rnd(maxH);});
    if(occ){
      let has=false;
      for(let c=0;c<N&&!has;c++)for(let r1=0;r1<N;r1++)for(let r2=r1+1;r2<N;r2++)
        if(h[r1][c]>0&&h[r2][c]>0&&h[r1][c]>h[r2][c])has=true;
      if(!has){outer:for(let c=0;c<N;c++){const rows=[];for(let r=0;r<N;r++)if(h[r][c]>0)rows.push(r);
        if(rows.length>=2){h[rows[0]][c]=maxH;h[rows[rows.length-1]][c]=1;break outer;}}}
    }
    if(cs.length>=2)return h;
  }
  return [[1,0,0],[1,0,0],[0,0,0]];
}
function makeLevels(){
  const seen=new Set(),out=[];
  const plan=[[2,2,0],[3,2,0],[3,3,0],[4,3,0],[4,3,0],[5,3,1],[5,3,1],[6,3,1]];
  plan.forEach((p,i)=>{let h,s,t=0;
    do{h=randSolid(p[0],p[1],p[2]);s=sig(h);t++;}while(seen.has(s)&&t<30);
    seen.add(s);out.push({name:'第'+(i+1)+'关',h});});
  return out;
}
let LEVELS=null; // 延后到 start() 生成：makeLevels 依赖 THREE 与后置 const，顶层执行会踩暂时性死区
/* 三视图（与 build.html 完全一致） */
function views(h){
  const front=[],left=[],top=[];
  for(let L=0;L<MAXH;L++){front.push([0,0,0]);left.push([0,0,0]);}
  for(let r=0;r<N;r++){top.push([0,0,0]);
    for(let c=0;c<N;c++){const v=h[r][c];
      if(v>0)top[r][c]=1;
      for(let L=0;L<v;L++){front[L][c]=1;left[L][r]=1;}
    }
  }
  return {front:front.slice().reverse(), left:left.slice().reverse(), top};
}
/* 裁掉外围空行空列，得到形状最小外接框（用于按视图实际大小定网格 & 位置无关判定） */
function trim(g){let r0=9,r1=-1,c0=9,c1=-1;
  g.forEach((row,r)=>row.forEach((v,c)=>{if(v){if(r<r0)r0=r;if(r>r1)r1=r;if(c<c0)c0=c;if(c>c1)c1=c;}}));
  if(r1<0)return [[0]];
  const out=[];for(let r=r0;r<=r1;r++)out.push(g[r].slice(c0,c1+1));return out;}
const shapeEq=(a,b)=>JSON.stringify(trim(a))===JSON.stringify(trim(b));
/* 在 GS×GS 网格里，把 ansShape 平移到与 draw 重叠最多的位置，返回对齐后的答案网格（用于红/绿提示） */
function bestAlign(draw,ansShape,GS){
  const sh=trim(ansShape),sr=sh.length,sc=sh[0].length;
  let best=null,bestScore=-1;
  for(let dr=0;dr<=GS-sr;dr++)for(let dc=0;dc<=GS-sc;dc++){
    const grid=Array.from({length:GS},()=>Array(GS).fill(0));
    for(let r=0;r<sr;r++)for(let c=0;c<sc;c++)if(sh[r][c])grid[r+dr][c+dc]=1;
    let sc2=0;for(let r=0;r<GS;r++)for(let c=0;c<GS;c++)if(grid[r][c]&&draw[r][c])sc2++;
    if(sc2>bestScore){bestScore=sc2;best=grid;}
  }
  return best;
}

/* ============ 遮挡检测 + 视角选择 ============ */
/* 用 Three.js 真实 Raycaster 在已构建的 mesh 上判遮挡，与渲染画面完全一致。
   斜视角度：正面朝右前方，前后排自然错开，绝大多数立体一眼看全。 */
/* 全部用正 yaw：正面统一朝右前方，保证每题正面朝向一致（不会突然朝左） */
const _YAWS=[0.6,0.72,0.5,0.85,0.42,0.95], _PITCHES=[0.5,0.62,0.72,0.42];
const VIEW_CANDS=[]; _YAWS.forEach(y=>_PITCHES.forEach(p=>VIEW_CANDS.push([y,p])));
const _ray=new THREE.Raycaster();
const _SAMP=[[0,0,0],[.44,.44,.44],[-.44,.44,.44],[.44,-.44,.44],[-.44,-.44,.44],[.44,.44,-.44],[-.44,.44,-.44],[.44,-.44,-.44],[-.44,-.44,-.44]];
function _cubeVisible(mesh){ // 该方块是否至少露出一角（从相机发射线，首个命中是自己就算可见）
  for(const s of _SAMP){
    const P=mesh.localToWorld(new THREE.Vector3(s[0],s[1],s[2]));
    const dir=P.clone().sub(camera.position).normalize();
    _ray.set(camera.position,dir);
    const hits=_ray.intersectObjects(blocks.children,false);
    if(hits.length&&hits[0].object===mesh)return true;
  }
  return false;
}
/* 在候选角度里选第一个能看全的（斜视优先）；都看不全则返回露出最多的，并标记 full=false */
function selectView(){
  const total=blocks.children.length;
  let best=null,bestN=-1;
  for(const [y,p] of VIEW_CANDS){
    world.rotation.set(p,y,0); world.updateMatrixWorld(true);
    let n=0; for(const m of blocks.children) if(_cubeVisible(m)) n++;
    if(n>=total)return {yaw:y,pitch:p,full:true};
    if(n>bestN){bestN=n;best={yaw:y,pitch:p,full:false};}
  }
  return best;
}

/* ============ Three.js（沿用 build.html 的相机/描边/正面标记） ============ */
let renderer,scene,camera,world,blocks,yaw=0,pitch=0.52,threeReady=false;
function initThree(){
  const cv=document.getElementById('cv');
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(40,1,0.1,100);camera.position.set(0,0,18);
  scene.add(new THREE.AmbientLight(0xffffff,0.92));
  const d=new THREE.DirectionalLight(0xffffff,0.5);d.position.set(4,7,5);scene.add(d);
  world=new THREE.Group();scene.add(world);
  const base=new THREE.Mesh(new THREE.BoxGeometry(N+0.3,0.2,N+0.3),
    new THREE.MeshStandardMaterial({color:0x14335c}));
  base.position.y=-0.1;world.add(base);
  const mark=new THREE.Mesh(new THREE.PlaneGeometry(N+0.3,0.2),
    new THREE.MeshBasicMaterial({color:0xfacc15}));
  mark.position.set(0,-0.1,(N+0.3)/2+0.011);world.add(mark);
  blocks=new THREE.Group();world.add(blocks);
  resize();addEventListener('resize',resize);animate();
}
function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
const COLBYH=[0x4ade80,0xfacc15,0xfb7185];
function rebuild(h){
  [...blocks.children].forEach(c=>{blocks.remove(c);
    c.traverse&&c.traverse(o=>{o.geometry&&o.geometry.dispose();o.material&&o.material.dispose();});});
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)for(let L=0;L<h[r][c];L++){
    const g=new THREE.BoxGeometry(0.9,0.9,0.9);
    const m=new THREE.MeshStandardMaterial({color:COLBYH[Math.min(L,2)],roughness:.7});
    const cube=new THREE.Mesh(g,m);cube.position.set(c-1,L+0.45,(r-1));blocks.add(cube);
    const edges=new THREE.LineSegments(new THREE.EdgesGeometry(g),
      new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.35}));
    cube.add(edges);
  }
}
function animate(){requestAnimationFrame(animate);if(!world)return;
  world.rotation.y=yaw;world.rotation.x=pitch;renderer.render(scene,camera);}

/* ============ 游戏 ============ */
const $=id=>document.getElementById(id);
const VKEYS=[['front','正面看'],['left','左面看'],['top','上面看']];
let lv=0, target, step, draw, score=0, checked, ansShape, GS;
const R={
  load(){
    let def=LEVELS[lv], v;
    // 先建 mesh 再用真实 raycaster 选斜视角度；若这道题所有候选都看不全，就换一道新题重试
    for(let tries=0;tries<40;tries++){
      rebuild(def.h);
      v=selectView();
      if(v.full)break;
      const nd=this._regen(def); if(!nd)break; def=nd; LEVELS[lv]=def;
    }
    target=views(def.h); yaw=v.yaw; pitch=v.pitch;
    $('lvNo').textContent=lv+1;
    step=0; this.startStep();
    $('banner').classList.remove('show');
  },
  _regen(old){ // 按同规模重生成一道不重复的新题
    const cells=old.h.flat().filter(x=>x>0).length;
    for(let t=0;t<30;t++){const h=randSolid(cells,3,0);
      if(sig(h)!==sig(old.h))return {name:old.name,h};}
    return null;
  },
  startStep(){
    checked=false;
    // 画图格子是正方形，边长按形状最大边定：最大边≤2→2×2，达到3→3×3
    ansShape=trim(target[VKEYS[step][0]]);
    GS=Math.max(ansShape.length, ansShape[0].length)<=2 ? 2 : 3;
    draw=Array.from({length:GS},()=>Array(GS).fill(0));
    ['s0','s1','s2'].forEach((id,i)=>{$(id).className='step'+(i<step?' done':i===step?' now':'');});
    const label=VKEYS[step][1];
    $('drawLab').textContent='画「'+label+'」到的形状';
    $('tip').innerHTML='';
    $('okBtn').textContent='确定';
    this.renderGrid();
  },
  renderGrid(showAns){
    const g=$('dgrid');
    const sz=GS<=2?64:46; // 2×2 时格子放大，更好点
    g.style.gridTemplateColumns=`repeat(${GS},${sz}px)`;
    g.style.gridAutoRows=sz+'px';
    const aligned=showAns?bestAlign(draw,ansShape,GS):null;
    g.innerHTML=draw.map((row,r)=>row.map((v,c)=>{
      let cls='dc'+(v?' on':'');
      if(showAns){ const should=aligned[r][c];
        if(v&&!should)cls='dc err'; else if(!v&&should)cls='dc miss'; else if(v&&should)cls='dc on'; }
      return `<div class="${cls}" onclick="R.toggle(${r},${c})"></div>`;
    }).join('')).join('');
  },
  toggle(r,c){ if(checked){checked=false;} draw[r][c]=draw[r][c]?0:1; Audio8.sfx.pop(); this.renderGrid(); },
  clearDraw(){draw=Array.from({length:GS},()=>Array(GS).fill(0));checked=false;this.renderGrid();},
  confirm(){
    const painted=draw.some(row=>row.some(v=>v)); // 一个格子都没画 = 未作答
    if(!painted){
      Audio8.sfx.wrong();
      $('tip').innerHTML='还没画呢，先点格子涂出形状再确定～';
      return;
    }
    const ok=shapeEq(draw,ansShape);
    if(ok){
      score+=10;$('score').textContent=score;
      step++;
      if(step>=3){this.win();}
      else{Audio8.sfx.correct();$('tip').innerHTML='✅ 对！进入下一个视图。';setTimeout(()=>this.startStep(),700);}
    }else{
      checked=true;this.renderGrid(true);Audio8.sfx.wrong();
      $('tip').innerHTML='❌ 还差一点：<span style="color:var(--bad)">红=多涂</span>，<span style="color:var(--good)">绿虚线=漏涂</span>。改一改再确定。';
    }
  },
  win(){
    $('tip').innerHTML='🎉 三视图全部画对！';
    Audio8.sfx.win();
    $('banner').classList.add('show');
    if(lv+1>=LEVELS.length){ // 走完8关，弹通关框
      setTimeout(()=>{$('banner').classList.remove('show');$('overlay').classList.add('show');},1200);
      return;
    }
    setTimeout(()=>{ lv++; this.load(); },1600);
  },
  again(){ LEVELS=makeLevels(); lv=0; $('overlay').classList.remove('show'); this.load(); },
  rotateHint(){yaw+=Math.PI/6;},
  start(){if(!window.THREE){$('err').style.display='flex';return;}
    if(!threeReady){initThree();threeReady=true;}
    if(!LEVELS)LEVELS=makeLevels();
    this.load();}
};
/* 拖动转视角（锁俯视） */
let drag=null;
document.getElementById('cv').addEventListener('pointerdown',e=>{drag={x:e.clientX,y:e.clientY,yaw,pitch};});
addEventListener('pointermove',e=>{if(!drag)return;
  yaw=drag.yaw+(e.clientX-drag.x)*0.008;pitch=drag.pitch-(e.clientY-drag.y)*0.008;
  pitch=Math.max(0.15,Math.min(1.15,pitch));});
addEventListener('pointerup',()=>drag=null);
R.start();
</script>
