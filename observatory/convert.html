<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>天文观测台 · 刻度校准所</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --paper:#f2e6c9; --paper2:#e7d6ae; --ink:#274060; --ink2:#3b587c;
  --copper:#b0703a; --copper-d:#8a5326; --copper-l:#d59a5f;
  --good:#3f7a4d; --bad:#a23b34; --gold:#c8912f; --muted:#8a7a58;
}
html,body{height:100%;overflow:hidden;color:var(--ink);user-select:none;touch-action:none;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
  font-family:Georgia,'Times New Roman','Songti SC','STSong',serif}
body{background:
  radial-gradient(circle at 22% 14%,rgba(176,112,58,.10),transparent 46%),
  radial-gradient(circle at 82% 88%,rgba(39,64,96,.10),transparent 48%),
  repeating-linear-gradient(0deg,rgba(138,83,38,.035) 0 2px,transparent 2px 4px),
  var(--paper)}
#app{position:fixed;top:0;left:0;right:0;height:100vh;height:100dvh;
  display:flex;flex-direction:column;align-items:center;overflow:hidden}

.home-btn,.snd-btn{position:absolute;top:calc(10px + env(safe-area-inset-top));z-index:8;
  border:1.5px solid var(--copper-d);background:linear-gradient(#e8c98f,#c98f52);
  color:#3a230f;border-radius:9px;padding:6px 11px;font-size:16px;cursor:pointer;
  box-shadow:0 2px 0 var(--copper-d),inset 0 1px 1px rgba(255,255,255,.4)}
.home-btn{left:12px}.snd-btn{right:12px}
.home-btn:active,.snd-btn:active{transform:translateY(2px);box-shadow:0 0 0 var(--copper-d)}

.top{width:100%;max-width:560px;padding:12px 16px 2px;text-align:center;z-index:5}
.top h1{font-size:20px;letter-spacing:1px;color:var(--ink);font-weight:700}
.top h1 small{font-size:11px;color:var(--muted);letter-spacing:0;font-weight:400}
.steps{display:flex;gap:5px;justify-content:center;margin-top:9px}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(138,83,38,.28);border:1px solid var(--copper-d)}
.dot.now{background:var(--gold);box-shadow:0 0 6px rgba(200,145,47,.7)}
.dot.done{background:var(--good)}

/* 任务铜牌 */
.task{margin:12px auto 0;max-width:460px;z-index:5;
  background:linear-gradient(#e7c890,#cf9c5e);border:2px solid var(--copper-d);
  border-radius:13px;padding:11px 16px;text-align:center;color:#3a230f;
  box-shadow:0 3px 0 var(--copper-d),inset 0 1px 2px rgba(255,255,255,.45)}
.task .lab{font-size:12px;letter-spacing:2px;color:#6b4522}
.task .goal{font-size:17px;font-weight:700;line-height:1.4;margin-top:3px}
.task .goal b{color:var(--ink)}
.task .goal .big{font-size:20px}

.stageSpace{flex:1;min-height:6px;display:flex;align-items:center;justify-content:center;width:100%;padding:0 14px}

/* 每关校准成功卡片（夹在题目框与托盘之间，不遮答案） */
.result{opacity:0;transform:scale(.92);transition:opacity .25s,transform .25s;text-align:center;max-width:420px;
  background:rgba(242,230,201,.98);border:2px solid var(--copper-d);border-radius:14px;padding:11px 20px;
  box-shadow:0 6px 16px rgba(58,35,15,.22)}
.result:empty{display:none}
.result.show{opacity:1;transform:scale(1)}
.result.perfect{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,145,47,.35),0 6px 16px rgba(58,35,15,.22)}
.result .grade{font-size:19px;font-weight:700;color:var(--good);margin-bottom:2px}
.result.perfect .grade{color:var(--gold)}
.result .detail{font-size:13px;color:var(--ink2);line-height:1.6}
.result .detail b{color:var(--copper-d)}

/* 三托盘 */
.trays{display:flex;gap:10px;justify-content:center;align-items:stretch;margin:14px auto 0;
  max-width:520px;width:100%;padding:0 12px;z-index:5}
.tray{flex:1;max-width:150px;display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(#efe0bd,#e0cc9f);border:2px solid var(--copper-d);border-radius:14px;
  padding:12px 8px 10px;box-shadow:inset 0 2px 4px rgba(138,83,38,.2),0 3px 0 var(--copper-d)}
.tray .unit{font-size:13px;color:#6b4522;letter-spacing:1px;font-weight:700}
.tray .val{font-size:34px;font-weight:700;color:var(--ink);line-height:1.1;margin:4px 0}
.tray .val .sym{font-size:18px;color:var(--copper-d)}
.tray.hot .val{color:var(--bad)}
.tray .val.neg{color:var(--bad)}
.tray .ops{display:flex;flex-direction:column;gap:6px;width:100%;margin-top:6px}
.opbtn{border:1.5px solid var(--copper-d);border-radius:9px;padding:8px 4px;font:700 13px Georgia,serif;
  cursor:pointer;color:#3a230f;background:linear-gradient(#eccf97,#cf9c5e);
  box-shadow:0 3px 0 var(--copper-d),inset 0 1px 1px rgba(255,255,255,.4);line-height:1.25}
.opbtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--copper-d)}
.opbtn:disabled{opacity:.35;box-shadow:0 3px 0 var(--copper-d);cursor:default}
.opbtn.armed{background:linear-gradient(#f6e4b0,#e6b56a);box-shadow:0 0 0 2px var(--gold),0 3px 0 var(--copper-d)}
.opbtn small{display:block;font-size:10px;font-weight:400;color:#6b4522}

/* 底部面板 */
.panel{position:relative;z-index:5;width:100%;max-width:560px;display:flex;flex-direction:column;align-items:center;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));margin-top:auto}
.readout{min-height:22px;font-size:13.5px;color:var(--ink2);text-align:center;font-weight:600;line-height:1.5;margin-bottom:9px;padding:0 8px}
.readout b{color:var(--copper-d)}

/* 拨杆条 */
.dialer{width:100%;max-width:460px;background:linear-gradient(#efe0bd,#e0cc9f);
  border:2px solid var(--copper-d);border-radius:14px;padding:11px 14px 12px;
  box-shadow:0 4px 0 var(--copper-d),inset 0 1px 2px rgba(255,255,255,.45);display:none}
.dialer.show{display:block;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.dtitle{font-size:15px;font-weight:700;color:#3a230f;text-align:center}
.dtitle small{display:block;font-size:11px;color:#6b4522;font-weight:400;margin-top:2px;letter-spacing:1px}
.dialRow{display:flex;align-items:center;gap:9px;margin:14px 0 7px}
.sliderWrap{position:relative;flex:1;padding-top:30px}
#nSlider{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:5px;outline:none;
  background:linear-gradient(#d9c191,#c4a468);border:1px solid var(--copper-d)}
#nSlider::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;cursor:pointer;
  background:linear-gradient(#eccf97,#c98f52);border:1.5px solid var(--copper-d);box-shadow:0 2px 3px rgba(58,35,15,.35)}
#nSlider::-moz-range-thumb{width:26px;height:26px;border-radius:50%;cursor:pointer;
  background:linear-gradient(#eccf97,#c98f52);border:1.5px solid var(--copper-d);box-shadow:0 2px 3px rgba(58,35,15,.35)}
.nbubble{position:absolute;top:0;transform:translateX(-50%);min-width:34px;padding:2px 7px;text-align:center;
  font-size:20px;font-weight:700;color:var(--ink);background:linear-gradient(#f6e9c8,#e7d09b);
  border:1.5px solid var(--copper-d);border-radius:8px;box-shadow:0 2px 4px rgba(58,35,15,.25);
  pointer-events:none;white-space:nowrap;transition:left .02s linear}
.nbubble::after{content:'';position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--copper-d)}
.nudge{width:40px;height:40px;border:1.5px solid var(--copper-d);border-radius:9px;
  background:linear-gradient(#eccf97,#cf9c5e);font:700 22px Georgia,serif;color:#3a230f;
  box-shadow:0 3px 0 var(--copper-d);cursor:pointer;flex-shrink:0;line-height:1}
.nudge:active{transform:translateY(2px);box-shadow:0 1px 0 var(--copper-d)}
.dhint{font-size:13.5px;color:var(--ink2);text-align:center;font-weight:600;min-height:20px;margin-bottom:10px}
.dhint b{color:var(--copper-d);font-size:16px}
.dbtns{display:flex;gap:10px;justify-content:center}

.btns{display:flex;gap:12px;justify-content:center;align-items:center}
.btn{border:2px solid var(--copper-d);border-radius:12px;padding:11px 22px;
  font:700 15px Georgia,serif;cursor:pointer;color:#3a230f;
  background:linear-gradient(#eccf97,#cf9c5e);
  box-shadow:0 4px 0 var(--copper-d),inset 0 1px 2px rgba(255,255,255,.45)}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--copper-d)}
.btn.ghost{background:linear-gradient(#efe4c6,#ddc99b);color:var(--ink)}
.btn:disabled{opacity:.45}
.foot{font-size:12px;color:var(--muted);margin-top:10px;text-align:center}
.foot b{color:var(--copper-d)}

.banner{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%) scale(.85);opacity:0;
  background:rgba(242,230,201,.98);border:2px solid var(--copper-d);border-radius:16px;
  padding:16px 24px;text-align:center;z-index:14;transition:.28s;pointer-events:none;
  box-shadow:0 8px 22px rgba(58,35,15,.28)}
.banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.banner.clickable{pointer-events:auto}
.banner.perfect{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,145,47,.4),0 8px 22px rgba(58,35,15,.28)}
.banner .grade{font-size:20px;font-weight:700;margin-bottom:4px;color:var(--good)}
.banner.perfect .grade{color:var(--gold)}
.banner .detail{font-size:13.5px;color:var(--ink2);line-height:1.7}
.banner .detail b{color:var(--copper-d)}

/* 矮屏自适应：视口越矮，字号与间距分档收紧，保证拨杆条与「确认转换」永远露全、无需滚动 */
@media (max-height:760px){
  .top{padding:9px 16px 2px}
  .task{margin-top:9px}
  .trays{margin-top:10px}
  .tray .val{font-size:30px}
  .panel{padding-top:10px}
}
@media (max-height:680px){
  .top{padding:7px 16px 2px}
  .top h1{font-size:18px}
  .steps{margin-top:6px}
  .task{margin-top:7px;padding:8px 14px}
  .task .goal{font-size:15px}
  .task .goal .big{font-size:18px}
  .trays{margin-top:8px}
  .tray{padding:9px 7px 8px}
  .tray .val{font-size:27px}
  .tray .unit{font-size:12px}
  .opbtn{padding:6px 4px;font-size:12px}
  .panel{padding-top:8px}
  .readout{min-height:0;margin-bottom:6px;font-size:12.5px}
  .dialer{padding:9px 12px 10px}
  .dialRow{margin:10px 0 5px}
  .sliderWrap{padding-top:26px}
  .dhint{margin-bottom:7px}
  .foot{margin-top:6px}
}
@media (max-height:600px){
  .top{padding:5px 16px 1px}
  .top h1{font-size:16px}
  .top h1 small{display:none}
  .steps{margin-top:4px}
  .dot{width:8px;height:8px}
  .task{margin-top:5px;padding:6px 12px}
  .task .goal{font-size:14px;line-height:1.3}
  .task .goal .big{font-size:17px}
  .trays{margin-top:6px;gap:8px}
  .tray{padding:7px 6px 7px}
  .tray .val{font-size:23px;margin:2px 0}
  .tray .unit{font-size:11px}
  .opbtn{padding:5px 3px;font-size:11px}
  .opbtn small{font-size:9px}
  .panel{padding-top:6px}
  .readout{margin-bottom:5px;font-size:12px;line-height:1.4}
  .dialer{padding:8px 11px 9px}
  .dtitle{font-size:14px}
  .dialRow{margin:8px 0 4px}
  .sliderWrap{padding-top:24px}
  .nudge{width:36px;height:36px;font-size:20px}
  .dhint{margin-bottom:6px;min-height:0}
  .btn{padding:9px 18px;font-size:14px}
  .foot{margin-top:5px;font-size:11px}
}
</style>
</head>
<body>
<div id="app">
  <button class="home-btn" onclick="location.href='index.html'">🏠</button>
  <button class="snd-btn" id="sndBtn" onclick="Sound.toggle()">🔊</button>
  <div class="top">
    <h1>🧭 刻度校准所 <small>整理度 · 分 · 秒</small></h1>
    <div class="steps" id="steps"></div>
  </div>

  <div class="task">
    <div class="goal" id="goalText">把 <span class="big"><b>150′</b></span> 整理成规范的「度 分」写法</div>
  </div>

  <div class="stageSpace"><div class="result" id="result"></div></div>

  <div class="trays" id="trays">
    <div class="tray" id="trayD">
      <div class="unit">度 °</div>
      <div class="val"><span id="valD">0</span><span class="sym">°</span></div>
      <div class="ops">
        <button class="opbtn" id="dDown" onclick="Dialer.open('d_down')">拆开 ↓<small>1° → 60′</small></button>
      </div>
    </div>
    <div class="tray" id="trayM">
      <div class="unit">分 ′</div>
      <div class="val"><span id="valM">0</span><span class="sym">′</span></div>
      <div class="ops">
        <button class="opbtn" id="mUp" onclick="Dialer.open('m_up')">合成 ↑<small>60′ → 1°</small></button>
        <button class="opbtn" id="mDown" onclick="Dialer.open('m_down')">拆开 ↓<small>1′ → 60″</small></button>
      </div>
    </div>
    <div class="tray" id="trayS">
      <div class="unit">秒 ″</div>
      <div class="val"><span id="valS">0</span><span class="sym">″</span></div>
      <div class="ops">
        <button class="opbtn" id="sUp" onclick="Dialer.open('s_up')">合成 ↑<small>60″ → 1′</small></button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="readout" id="readout">点托盘上的按钮，估一估要换算几组，拨好后「确认转换」。</div>

    <div class="dialer" id="dialer">
      <div class="dtitle" id="dTitle"></div>
      <div class="dialRow">
        <button class="nudge" onclick="Dialer.nudge(-1)">−</button>
        <div class="sliderWrap">
          <div class="nbubble" id="nBubble">1</div>
          <input type="range" id="nSlider" min="0" max="120" value="1" oninput="Dialer.update()">
        </div>
        <button class="nudge" onclick="Dialer.nudge(1)">＋</button>
      </div>
      <div class="dhint" id="dHint"></div>
      <div class="dbtns">
        <button class="btn ghost" onclick="Dialer.cancel()">取消</button>
        <button class="btn" onclick="Dialer.confirm()">确认转换</button>
      </div>
    </div>

    <div class="btns" id="idleBar">
      <button class="btn ghost" id="resetBtn" onclick="Game.resetHolding()">重置本台</button>
    </div>

    <div class="foot">第 <b id="prog">1</b>/<b id="total">8</b> 台 · 确认 <b id="confCount">0</b> 次 · 得分 <b id="score">0</b></div>
  </div>

  <div class="banner" id="banner"></div>
</div>

<script>
/* ============ 音频：舒缓夜空氛围 BGM + 柔和音效（与 aim.html 同一套） ============ */
const Sound=(function(){
  let ctx,master,musicGain,on=true,playing=false,timer=null,idx=0,nextT=0;
  const BEAT=1.9;
  const CHORDS=[
    [220.00,261.63,329.63],[196.00,246.94,293.66],
    [174.61,220.00,261.63],[196.00,246.94,329.63],
  ];
  function init(){
    if(ctx)return;
    const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
    ctx=new AC();
    master=ctx.createGain();master.gain.value=0.9;master.connect(ctx.destination);
    musicGain=ctx.createGain();musicGain.gain.value=0.10;musicGain.connect(master);
  }
  function pad(freq,dur,when,vol){
    const t=when,o=ctx.createOscillator(),g2=ctx.createGain(),f=ctx.createBiquadFilter();
    o.type='sine';o.frequency.value=freq;f.type='lowpass';f.frequency.value=900;
    g2.gain.setValueAtTime(0.0001,t);g2.gain.linearRampToValueAtTime(vol,t+dur*0.35);
    g2.gain.linearRampToValueAtTime(0.0001,t+dur);
    o.connect(f);f.connect(g2);g2.connect(musicGain);o.start(t);o.stop(t+dur+0.05);
  }
  function schedule(){
    if(!ctx)return;
    while(nextT<ctx.currentTime+0.6){
      const ch=CHORDS[idx%CHORDS.length];
      ch.forEach((f,k)=>pad(f,BEAT*1.15,nextT,0.16-k*0.03));
      if(idx%2===0)pad(ch[2]*2,BEAT*0.9,nextT+BEAT*0.4,0.05);
      nextT+=BEAT;idx++;
    }
  }
  function startMusic(){if(!ctx||playing||!on)return;playing=true;nextT=ctx.currentTime+0.1;timer=setInterval(schedule,120);schedule();}
  function stopMusic(){playing=false;if(timer){clearInterval(timer);timer=null;}}
  function tone(freq,dur,type,vol,when,glideTo){
    const t=when||ctx.currentTime,o=ctx.createOscillator(),g2=ctx.createGain();
    o.type=type||'sine';o.frequency.setValueAtTime(freq,t);
    if(glideTo)o.frequency.exponentialRampToValueAtTime(glideTo,t+dur);
    g2.gain.setValueAtTime(0.0001,t);g2.gain.linearRampToValueAtTime(vol||0.2,t+0.02);
    g2.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g2);g2.connect(master);o.start(t);o.stop(t+dur+0.03);
  }
  const sfx={
    up(){if(ctx&&on){tone(392,0.09,'sine',0.16);tone(587,0.12,'sine',0.14,ctx.currentTime+0.06);}},   // 合成：升
    down(){if(ctx&&on){tone(494,0.09,'sine',0.16);tone(330,0.12,'sine',0.14,ctx.currentTime+0.06);}},   // 拆开：降
    nope(){if(ctx&&on)tone(180,0.12,'triangle',0.12,undefined,150);},                                   // 不可操作
    great(){if(!ctx||!on)return;const t=ctx.currentTime;[659.25,880,1174.7,1318.5].forEach((f,k)=>tone(f,0.55,'sine',0.16,t+k*0.10));},
    poor(){if(!ctx||!on)return;const t=ctx.currentTime;tone(330,0.3,'sine',0.14,t,196);},
    win(){if(!ctx||!on)return;const t=ctx.currentTime;[440,554.37,659.25,880,659.25,880].forEach((f,k)=>tone(f,0.5,'sine',0.16,t+k*0.13));}
  };
  function ensure(){init();if(ctx&&ctx.state==='suspended')ctx.resume();if(on)startMusic();}
  function toggle(){on=!on;if(on)ensure();else stopMusic();const b=document.getElementById('sndBtn');if(b)b.textContent=on?'🔊':'🔇';return on;}
  ['pointerdown','touchstart','keydown'].forEach(ev=>addEventListener(ev,()=>ensure(),{once:true,passive:true}));
  return {ensure,toggle,sfx,isOn:()=>on};
})();

/* ============ B关：度分秒换算 · 拨杆版 ============ */
const $=id=>document.getElementById(id);
const ROUND=8;
const fmt=(d,m,s)=>{let a=[];if(d)a.push(d+'°');if(m)a.push(m+'′');if(s)a.push(s+'″');return a.length?a.join(''):'0';};

/* 每种操作的换算口 */
const OPS={
  s_up:  {label:'合成：秒 → 分', unit:'每 60″ = 1′', max:120},
  m_up:  {label:'合成：分 → 度', unit:'每 60′ = 1°', max:12},
  d_down:{label:'拆开：度 → 分', unit:'每 1° = 60′', max:12},
  m_down:{label:'拆开：分 → 秒', unit:'每 1′ = 60″', max:12},
};
/* 各题型理论最少确认次数 */
const MINCONF={A:1,B:1,C:2,D:2};

/* 秒 → 规范度分秒 */
function toStd(totalSec){return {d:Math.floor(totalSec/3600),m:Math.floor((totalSec%3600)/60),s:totalSec%60};}

/* 题型：
   A 单位→标准：给全为分 → 目标标准(度分)          最少 1 次  （分化度）
   B 标准→单位：给标准(度分) → 目标全为分           最少 1 次  （度化分）
   C 带秒→标准：给全为秒 → 目标标准(度分秒)         最少 2 次  （秒化度分，度=1，总秒≤6000）
   D 整理归一：给不规范度分秒(分秒均≥60) → 规范写法  最少 2 次  （度分秒都有数据，整理进位）
*/
function makeLevel(kind){
  if(kind==='A'){ // 全分 → 标准（度分，无秒）
    const d=1+Math.floor(Math.random()*4), m=10+Math.floor(Math.random()*49); // 目标 d°m′
    const totalMin=d*60+m;
    return{kind,start:{d:0,m:totalMin,s:0}, target:{d,m,s:0}, targetForm:'dm',
      q:`把 <span class="big"><b>${totalMin}′</b></span> 整理成规范的「度 分」写法`};
  }
  if(kind==='B'){ // 标准(度分) → 全分
    const d=1+Math.floor(Math.random()*4), m=5+Math.floor(Math.random()*54);
    const totalMin=d*60+m;
    return{kind,start:{d,m,s:0}, target:{d:0,m:totalMin,s:0}, targetForm:'m',
      q:`把 <span class="big"><b>${d}°${m}′</b></span> 全部换算成「分」`};
  }
  if(kind==='D'){ // 不规范度分秒 → 规范（分、秒各进位一次）
    const d0=1+Math.floor(Math.random()*3);       // 1..3
    const m0=60+Math.floor(Math.random()*40);      // 60..99（需分收一次）
    const s0=61+Math.floor(Math.random()*39);      // 61..99（需秒收一次）
    const std=toStd(d0*3600+m0*60+s0);
    return{kind,start:{d:d0,m:m0,s:s0}, target:std, targetForm:'dms',
      q:`整理观测记录 <span class="big"><b>${d0}°${m0}′${s0}″</b></span> 的规范写法`};
  }
  // C 全秒 → 标准（度分秒）；度固定为 1、总秒 ≤ 6000″，确保秒收组数 61~99（＜杆量程 120）
  const d=1, m=1+Math.floor(Math.random()*39), s=1+Math.floor(Math.random()*59);
  const totalSec=d*3600+m*60+s;
  return{kind,start:{d:0,m:0,s:totalSec}, target:{d,m,s}, targetForm:'dms',
    q:`把 <span class="big"><b>${totalSec}″</b></span> 整理成规范的「度 分 秒」写法`};
}
function makePlan(){
  // 1-2 度化分(B) · 3-4 分化度(A) · 5-6 度分秒整理(D) · 7-8 秒化度分(C)
  const kinds=['B','B','A','A','D','D','C','C'];
  return kinds.map(makeLevel);
}
let PLAN=makePlan();

let lv=0, hold={d:0,m:0,s:0}, cur=null, score=0, confirms=0, locked=false, bannerTimer=null;

function setVal(id,v){const e=$(id);e.textContent=v;e.parentElement.classList.toggle('neg',v<0);}
function render(){
  setVal('valD',hold.d);setVal('valM',hold.m);setVal('valS',hold.s);
  $('trayM').classList.toggle('hot',hold.m>=60);
  $('trayS').classList.toggle('hot',hold.s>=60);
  const dOpen=!!Dialer.op, block=locked||dOpen;
  $('dDown').disabled=block||hold.d<1;
  $('mUp').disabled  =block||hold.m<60;
  $('mDown').disabled=block||hold.m<1;
  $('sUp').disabled  =block||hold.s<60;
  // 高亮当前正在拨的操作按钮
  ['dDown','mUp','mDown','sUp'].forEach(id=>$(id).classList.remove('armed'));
  if(dOpen){const map={d_down:'dDown',m_up:'mUp',m_down:'mDown',s_up:'sUp'};$(map[Dialer.op]).classList.add('armed');}
  $('resetBtn').disabled=locked;
  $('confCount').textContent=confirms;
}

/* ---- 拨杆条：估组数 → 确认转换 ---- */
function applyOp(op,N){
  if(op==='s_up'){hold.m+=N;hold.s-=60*N;}
  else if(op==='m_up'){hold.d+=N;hold.m-=60*N;}
  else if(op==='d_down'){hold.d-=N;hold.m+=60*N;}
  else if(op==='m_down'){hold.m-=N;hold.s+=60*N;}
}
function dialHint(op,N){
  if(op==='s_up')  return `预估：合成 <b>${N}</b> 组 → 分 +${N}′`;
  if(op==='m_up')  return `预估：合成 <b>${N}</b> 组 → 度 +${N}°`;
  if(op==='d_down')return `预估：拆开 <b>${N}</b> 组 → 分 +${N*60}′`;
  if(op==='m_down')return `预估：拆开 <b>${N}</b> 组 → 秒 +${N*60}″`;
  return '';
}
const Dialer={
  op:null,
  open(op){
    if(locked)return;
    this.op=op;
    const o=OPS[op];
    $('dTitle').innerHTML=`${o.label} <small>${o.unit}</small>`;
    const r=$('nSlider');r.max=o.max;r.value=1;
    this.update();
    $('dialer').classList.add('show');
    $('idleBar').style.display='none';
    render();
  },
  update(){
    const r=$('nSlider'), N=+r.value, max=+r.max||1;
    const b=$('nBubble');
    b.textContent=N;
    // 圆头宽 26px，两端各内缩 13px，气泡随圆头中心走
    const pct=N/max;
    b.style.left=`calc(13px + ${pct} * (100% - 26px))`;
    $('dHint').innerHTML=dialHint(this.op,N);
  },
  nudge(delta){
    const r=$('nSlider');
    r.value=Math.max(+r.min,Math.min(+r.max,+r.value+delta));
    this.update();
  },
  cancel(){this.close();},
  close(){
    $('dialer').classList.remove('show');
    $('idleBar').style.display='';
    this.op=null;
    render();
  },
  confirm(){
    const N=+$('nSlider').value, op=this.op;
    applyOp(op,N);
    confirms++;
    this.close();
    Game.afterConfirm(op);
  }
};

const Game={
  load(){
    cur=PLAN[lv];
    hold={...cur.start};
    confirms=0; locked=false;
    $('goalText').innerHTML=cur.q;
    $('prog').textContent=lv+1;
    Dialer.op=null;
    $('dialer').classList.remove('show');
    $('idleBar').style.display='';
    $('banner').classList.remove('show','clickable','perfect');
    $('result').className='result';$('result').innerHTML='';
    $('steps').innerHTML=PLAN.map((_,k)=>`<span class="dot ${k<lv?'done':k===lv?'now':''}"></span>`).join('');
    $('readout').innerHTML=hintFor(cur.targetForm);
    render();
  },
  afterConfirm(op){
    render();
    const t=cur.target;
    if(hold.d===t.d&&hold.m===t.m&&hold.s===t.s){this.win();return;}
    if(hold.d<0||hold.m<0||hold.s<0)Sound.sfx.poor();
    else (op.endsWith('_up')?Sound.sfx.up:Sound.sfx.down)();
    $('readout').innerHTML=statusMsg();
  },
  resetHolding(){
    if(locked)return;
    hold={...cur.start};
    $('readout').innerHTML=hintFor(cur.targetForm)+'<br><span style="color:var(--muted);font-weight:400">（已重置本台，确认次数仍会保留）</span>';
    render();
  },
  win(){
    Sound.sfx.great();
    locked=true;
    const t=cur.target;
    const perfect=confirms<=MINCONF[cur.kind];
    const pts=perfect?15:10;
    score+=pts;$('score').textContent=score;
    render();
    const r=$('result');
    r.className='result'+(perfect?' perfect':'');
    r.innerHTML=`<div class="grade">${perfect?'✦ 完美校准':'✧ 校准准确'}</div>`+
      `<div class="detail">整理为 <b>${fmt(t.d,t.m,t.s)}</b> · `+
      `${perfect?'一步到位！':''}<b>${confirms}</b> 次确认 · +${pts} 分<br>`+
      `<button class="btn" style="margin-top:8px;padding:7px 18px;font-size:14px" onclick="Game.next()">${lv>=ROUND-1?'看结果':'下一台 →'}</button></div>`;
    requestAnimationFrame(()=>r.classList.add('show'));
  },
  next(){
    if(bannerTimer){clearTimeout(bannerTimer);bannerTimer=null;}
    lv++;
    if(lv>=ROUND){this.finish();return;}
    this.load();
  },
  finish(){
    Sound.sfx.win();
    locked=true;
    const full=ROUND*15,star=score>=full*0.9?3:score>=full*0.6?2:1;
    const b=$('banner');
    b.className='banner';
    b.innerHTML=`<div class="grade" style="color:var(--gold)">🧭 校准完成</div>`+
      `<div class="detail">${'★'.repeat(star)}${'☆'.repeat(3-star)}<br>`+
      `本轮得分 <b>${score}</b> / ${full}<br>`+
      `<button class="btn" style="margin-top:10px;padding:8px 18px;font-size:14px" onclick="Game.restart()">再来一轮</button></div>`;
    b.classList.add('show','clickable');
    $('readout').innerHTML='一轮结束，估得越准、步数越省，越接近满星。';
  },
  restart(){lv=0;score=0;PLAN=makePlan();$('score').textContent=0;this.load();},
  start(){$('total').textContent=ROUND;this.load();}
};

function hintFor(form){
  if(form==='m')  return '目标：<b>全部化成分</b>。点度托盘的「拆开↓」，拨出要拆的度数，直到度为 0。';
  if(form==='dms')return '目标：<b>度 分 秒</b>规范写法。先把秒<b>合成</b>成分、再把分<b>合成</b>成度（分、秒都要小于 60）。';
  return '目标：<b>度 分</b>规范写法。点分托盘的「合成↑」，估一估分里有几个 60，拨好再确认。';
}
function statusMsg(){
  if(hold.d<0||hold.m<0||hold.s<0)
    return '❌ 有一格变成了负数 —— 这次<b>估多了</b>。看看差多少，往回拨补上，或点「重置本台」。';
  const f=cur.targetForm;
  if(f==='m'){ if(hold.d>0)return '度还没拆完：把每 1° 继续<b>拆开</b>成 60′，直到度为 0。'; }
  else if(f==='dm'){ if(hold.m>=60)return '分还满 60：继续把分<b>合成</b>成度，让分小于 60。'; }
  else { if(hold.s>=60)return '秒还满 60：先把秒<b>合成</b>成分。'; if(hold.m>=60)return '分还满 60：再把分<b>合成</b>成度。'; }
  return '快好了，再核对一下每一格是否都符合规范。';
}

Game.start();
</script>
