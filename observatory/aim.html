<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>天文观测台 · 望远镜对准</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --paper:#f2e6c9; --paper2:#e7d6ae; --ink:#274060; --ink2:#3b587c;
  --copper:#b0703a; --copper-d:#8a5326; --copper-l:#d59a5f;
  --good:#3f7a4d; --bad:#a23b34; --gold:#c8912f; --muted:#8a7a58;
}
html,body{height:100%;overflow:hidden;color:var(--ink);user-select:none;touch-action:none;
  font-family:Georgia,'Times New Roman','Songti SC','STSong',serif}
body{background:
  radial-gradient(circle at 22% 14%,rgba(176,112,58,.10),transparent 46%),
  radial-gradient(circle at 82% 88%,rgba(39,64,96,.10),transparent 48%),
  repeating-linear-gradient(0deg,rgba(138,83,38,.035) 0 2px,transparent 2px 4px),
  var(--paper)}
#app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center}

/* 顶栏 */
.home-btn,.snd-btn{position:absolute;top:calc(10px + env(safe-area-inset-top));z-index:8;
  border:1.5px solid var(--copper-d);background:linear-gradient(#e8c98f,#c98f52);
  color:#3a230f;border-radius:9px;padding:6px 11px;font-size:16px;cursor:pointer;
  box-shadow:0 2px 0 var(--copper-d),inset 0 1px 1px rgba(255,255,255,.4)}
.home-btn{left:12px}.snd-btn{right:12px}
.home-btn:active,.snd-btn:active{transform:translateY(2px);box-shadow:0 0 0 var(--copper-d)}

.top{width:100%;max-width:560px;padding:12px 16px 2px;text-align:center;z-index:5}
.top h1{font-size:20px;letter-spacing:1px;color:var(--ink);font-weight:700}
.top h1 small{font-size:11px;color:var(--muted);letter-spacing:0;font-weight:400}
.steps{display:flex;gap:5px;justify-content:center;margin-top:9px}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(138,83,38,.28);border:1px solid var(--copper-d)}
.dot.now{background:var(--gold);box-shadow:0 0 6px rgba(200,145,47,.7)}
.dot.done{background:var(--good)}

/* 任务铜牌 */
.task{margin:10px auto 0;max-width:440px;z-index:5;
  background:linear-gradient(#e7c890,#cf9c5e);border:2px solid var(--copper-d);
  border-radius:13px;padding:9px 16px;text-align:center;color:#3a230f;
  box-shadow:0 3px 0 var(--copper-d),inset 0 1px 2px rgba(255,255,255,.45)}
.task .lab{font-size:12px;letter-spacing:2px;color:#6b4522;text-transform:uppercase}
.task .goal{font-size:26px;font-weight:700;line-height:1.2}
.task .goal b{color:var(--ink);font-size:30px}

/* 观测舞台 */
.stage{flex:1;width:100%;display:flex;align-items:center;justify-content:center;min-height:220px;position:relative}
#sky{width:100%;height:100%;display:block;touch-action:none}

/* 底部面板 */
.panel{position:relative;z-index:5;width:100%;max-width:560px;display:flex;flex-direction:column;align-items:center;
  padding:0 16px calc(12px + env(safe-area-inset-bottom))}
.readout{min-height:26px;font-size:14px;color:var(--ink2);text-align:center;font-weight:600;line-height:1.5;margin-bottom:8px}
.readout b{color:var(--copper-d)}
.btns{display:flex;gap:12px;justify-content:center;align-items:center}
.btn{border:2px solid var(--copper-d);border-radius:12px;padding:12px 26px;
  font:700 16px Georgia,serif;cursor:pointer;color:#3a230f;
  background:linear-gradient(#eccf97,#cf9c5e);
  box-shadow:0 4px 0 var(--copper-d),inset 0 1px 2px rgba(255,255,255,.45)}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--copper-d)}
.btn.ghost{background:linear-gradient(#efe4c6,#ddc99b);color:var(--ink)}
.btn:disabled{opacity:.45;box-shadow:0 4px 0 var(--copper-d)}
.foot{font-size:12px;color:var(--muted);margin-top:9px;text-align:center}
.foot b{color:var(--copper-d)}

/* 揭晓横幅 */
.banner{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%) scale(.85);opacity:0;
  background:rgba(242,230,201,.97);border:2px solid var(--copper-d);border-radius:16px;
  padding:16px 24px;text-align:center;z-index:14;transition:.28s;pointer-events:none;
  box-shadow:0 8px 22px rgba(58,35,15,.28)}
.banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.banner.clickable{pointer-events:auto}
.banner .grade{font-size:22px;font-weight:700;margin-bottom:4px}
.banner .detail{font-size:13.5px;color:var(--ink2);line-height:1.7}
.banner .detail b{color:var(--copper-d)}
.errbox{position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;
  padding:30px;z-index:20;color:var(--bad);font-size:15px;line-height:1.8}
</style>
</head>
<body>
<div id="app">
  <button class="home-btn" onclick="location.href='index.html'">🏠</button>
  <button class="snd-btn" id="sndBtn" onclick="Sound.toggle()">🔊</button>
  <div class="top">
    <h1>🔭 望远镜对准 <small>转出指定的角度</small></h1>
    <div class="steps" id="steps"></div>
  </div>

  <div class="task">
    <div class="lab">观测任务</div>
    <div class="goal">把镜筒转到 <b id="goalDeg">60°</b></div>
  </div>

  <div class="stage">
    <canvas id="sky"></canvas>
    <div class="banner" id="banner"></div>
  </div>

  <div class="panel">
    <div class="readout" id="readout">用手指拖动镜筒，凭感觉转到目标角度，再按「锁定」。</div>
    <div class="btns">
      <button class="btn ghost" id="protractorBtn" onclick="Game.toggleProtractor()">量角器</button>
      <button class="btn" id="mainBtn" onclick="Game.mainAction()">锁定</button>
    </div>
    <div class="foot">第 <b id="prog">1</b>/<b id="total">8</b> 台 · 得分 <b id="score">0</b></div>
  </div>
</div>

<script>
/* ============ 音频：舒缓夜空氛围 BGM + 柔和音效（WebAudio 现场生成，无外部文件） ============ */
const Sound=(function(){
  let ctx,master,musicGain,on=true,playing=false,timer=null,idx=0,nextT=0;
  const BEAT=1.9; // 慢速，每个和弦近2秒
  // 舒缓小调式 pad 和弦进行（根-三-五），悠远夜空感
  const CHORDS=[
    [220.00,261.63,329.63], // Am
    [196.00,246.94,293.66], // G
    [174.61,220.00,261.63], // F
    [196.00,246.94,329.63], // G add
  ];
  function init(){
    if(ctx)return;
    const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
    ctx=new AC();
    master=ctx.createGain();master.gain.value=0.9;master.connect(ctx.destination);
    musicGain=ctx.createGain();musicGain.gain.value=0.10;musicGain.connect(master);
  }
  // 柔和长音（正弦+缓入缓出），构成 pad
  function pad(freq,dur,when,vol){
    const t=when,o=ctx.createOscillator(),g=ctx.createGain(),f=ctx.createBiquadFilter();
    o.type='sine';o.frequency.value=freq;
    f.type='lowpass';f.frequency.value=900;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(vol,t+dur*0.35);
    g.gain.linearRampToValueAtTime(0.0001,t+dur);
    o.connect(f);f.connect(g);g.connect(musicGain);o.start(t);o.stop(t+dur+0.05);
  }
  function schedule(){
    if(!ctx)return;
    while(nextT<ctx.currentTime+0.6){
      const ch=CHORDS[idx%CHORDS.length];
      ch.forEach((f,k)=>pad(f,BEAT*1.15,nextT,0.16-k*0.03));
      // 偶尔一点高处的“星光”单音
      if(idx%2===0)pad(ch[2]*2,BEAT*0.9,nextT+BEAT*0.4,0.05);
      nextT+=BEAT;idx++;
    }
  }
  function startMusic(){if(!ctx||playing||!on)return;playing=true;nextT=ctx.currentTime+0.1;timer=setInterval(schedule,120);schedule();}
  function stopMusic(){playing=false;if(timer){clearInterval(timer);timer=null;}}
  // 单音工具（音效用）
  function tone(freq,dur,type,vol,when,glideTo){
    const t=when||ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type||'sine';o.frequency.setValueAtTime(freq,t);
    if(glideTo)o.frequency.exponentialRampToValueAtTime(glideTo,t+dur);
    g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(vol||0.2,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+0.03);
  }
  const sfx={
    tick(){if(ctx&&on)tone(320,0.04,'triangle',0.06);},            // 拖动细响
    lock(){if(ctx&&on){tone(140,0.08,'square',0.16);tone(210,0.07,'square',0.12,ctx.currentTime+0.05);}}, // 仪器咔哒
    reveal(){if(!ctx||!on)return;const t=ctx.currentTime;[523.25,659.25,880].forEach((f,k)=>tone(f,0.5,'sine',0.16,t+k*0.11));}, // 轻柔铃音
    great(){if(!ctx||!on)return;const t=ctx.currentTime;[659.25,880,1174.7,1318.5].forEach((f,k)=>tone(f,0.55,'sine',0.16,t+k*0.10));},
    poor(){if(!ctx||!on)return;const t=ctx.currentTime;tone(330,0.3,'sine',0.14,t,196);},
    win(){if(!ctx||!on)return;const t=ctx.currentTime;[440,554.37,659.25,880,659.25,880].forEach((f,k)=>tone(f,0.5,'sine',0.16,t+k*0.13));}
  };
  function ensure(){init();if(ctx&&ctx.state==='suspended')ctx.resume();if(on)startMusic();}
  function toggle(){on=!on;if(on)ensure();else stopMusic();const b=document.getElementById('sndBtn');if(b)b.textContent=on?'🔊':'🔇';return on;}
  ['pointerdown','touchstart','keydown'].forEach(ev=>addEventListener(ev,()=>ensure(),{once:true,passive:true}));
  return {ensure,toggle,sfx,isOn:()=>on};
})();

/* ============ A关：望远镜对准 ============ */
const $=id=>document.getElementById(id);
const ROUND=8;
// 特殊角（好猜的整角）每轮最多出现 SPECIAL_MAX 次；所有目标角互不重复且两两间隔≥MIN_GAP
const SPECIAL=[30,45,60,90,120,135,150];
const SPECIAL_MAX=3;
const MIN_GAP=12;
function isSpecial(d){return SPECIAL.indexOf(d)>=0;}
function farEnough(d,list){return list.every(x=>Math.abs(x-d)>=MIN_GAP);}
function makeGoals(){
  for(let tries=0;tries<200;tries++){
    const out=[];let sp=0;
    // 先决定放几个特殊角（1..SPECIAL_MAX），并挑互相拉得开的特殊角
    const wantSp=1+Math.floor(Math.random()*SPECIAL_MAX);
    const spPool=SPECIAL.slice().sort(()=>Math.random()-0.5);
    for(const d of spPool){if(sp>=wantSp)break;if(farEnough(d,out)){out.push(d);sp++;}}
    // 其余用非特殊角填满，同样保证不重复、不相近
    let guard=0;
    while(out.length<ROUND&&guard++<400){
      const d=15+Math.floor(Math.random()*151); // 15..165
      if(isSpecial(d))continue;
      if(farEnough(d,out))out.push(d);
    }
    if(out.length===ROUND){
      // 打乱关卡顺序，别让特殊角都挤在前面
      for(let i=out.length-1;i>0;i--){const j=Math.floor((i+1)*Math.random());[out[i],out[j]]=[out[j],out[i]];}
      return out;
    }
  }
  return [20,55,80,105,130,155,40,70]; // 兜底：一组安全的互不相近角
}
let GOALS=makeGoals();
const cv=$('sky'),g=cv.getContext('2d');
let DPR=Math.min(devicePixelRatio||1,2),W=0,H=0,cx=0,cy=0,R=0;

let lv=0, goal=60, angle=25, locked=false, showProt=false, score=0, bannerTimer=null;

function resize(){
  const r=cv.getBoundingClientRect();
  W=r.width;H=r.height;
  cv.width=W*DPR;cv.height=H*DPR;
  g.setTransform(DPR,0,0,DPR,0,0);
  cx=W*0.5; cy=H*0.72; R=Math.min(W,H)*0.42;
  draw();
}

/* 角度以“从水平基准边(指向右)逆时针为正”，范围 5..175 */
function clampAngle(a){return Math.max(5,Math.min(175,a));}

function draw(){
  g.clearRect(0,0,W,H);
  // 背景星点
  drawStars();
  const baseLen=R*1.02;
  // 基准边（水平，指向右）——铜色实线
  g.lineWidth=4;g.strokeStyle='#b0703a';g.lineCap='round';
  line(cx,cy,cx+baseLen,cy);
  // 顶点
  g.fillStyle='#8a5326';circle(cx,cy,7);

  // 量角器（可选）
  if(showProt)drawProtractor(baseLen);

  // 目标角虚线（揭晓后才画）
  if(locked){
    const gr=rad(goal);
    g.save();g.setLineDash([7,6]);g.lineWidth=3;g.strokeStyle='#3f7a4d';
    line(cx,cy,cx+Math.cos(gr)*baseLen,cy-Math.sin(gr)*baseLen);
    g.restore();
    g.fillStyle='#3f7a4d';g.font='600 13px Georgia,serif';
    g.fillText('目标 '+goal+'°',cx+Math.cos(gr)*baseLen*0.7+6,cy-Math.sin(gr)*baseLen*0.7);
  }

  // 望远镜镜筒（活动边）
  drawScope(baseLen);

  // 揭晓后显示读数弧
  if(locked)drawArc();
}
function drawStars(){
  // 纯装饰星点，位置与答案无关，不再高亮目标
  const pts=[[0.10,0.18,1],[0.28,0.10,2],[0.70,0.14,1],[0.85,0.26,2],[0.90,0.58,1],[0.16,0.48,1],
    [0.60,0.24,2],[0.44,0.13,1],[0.80,0.42,1],[0.34,0.32,2],[0.52,0.52,1],[0.23,0.66,1],
    [0.68,0.62,2],[0.08,0.34,1],[0.94,0.40,1],[0.40,0.68,1],[0.5,0.10,1],[0.13,0.62,2]];
  pts.forEach((p,i)=>{
    const s=p[2]+0.6;
    if(i%5===0){g.save();g.fillStyle='#c8912f';g.shadowColor='rgba(200,145,47,.6)';g.shadowBlur=8;
      star(p[0]*W,p[1]*H,s+2,s);g.restore();}
    else{g.fillStyle='rgba(39,64,96,.3)';circle(p[0]*W,p[1]*H,s);}
  });
}
function drawScope(baseLen){
  const a=rad(angle),ex=cx+Math.cos(a)*baseLen,ey=cy-Math.sin(a)*baseLen;
  // 镜筒主体（粗铜管+高光）
  g.save();
  g.lineCap='round';
  g.lineWidth=13;g.strokeStyle='#8a5326';line(cx,cy,ex,ey);
  g.lineWidth=9;g.strokeStyle='#c98f52';line(cx,cy,ex,ey);
  g.lineWidth=3;g.strokeStyle='rgba(255,240,210,.6)';line(cx,cy,ex,ey);
  // 镜筒末端物镜圈
  g.lineWidth=3;g.strokeStyle='#8a5326';g.fillStyle='#274060';
  circle(ex,ey,9);g.stroke();
  g.restore();
  // 抓取提示环
  if(!locked){g.save();g.setLineDash([3,4]);g.strokeStyle='rgba(138,83,38,.5)';g.lineWidth=1.5;
    g.beginPath();g.arc(ex,ey,16,0,Math.PI*2);g.stroke();g.restore();}
}
function drawArc(){
  const a=rad(angle);
  g.save();g.lineWidth=3;g.strokeStyle='#a23b34';
  g.beginPath();g.arc(cx,cy,R*0.32,-0,-a,true);g.stroke();
  g.fillStyle='#a23b34';g.font='700 15px Georgia,serif';
  const mid=rad(angle/2);
  g.fillText(angle.toFixed(2)+'°',cx+Math.cos(mid)*R*0.42,cy-Math.sin(mid)*R*0.42);
  g.restore();
}
function drawProtractor(baseLen){
  g.save();
  g.strokeStyle='rgba(138,83,38,.55)';g.fillStyle='rgba(138,83,38,.7)';
  g.lineWidth=1.5;g.font='10px Georgia,serif';g.textAlign='center';
  g.beginPath();g.arc(cx,cy,R*0.9,-Math.PI,0);g.stroke();
  for(let d=0;d<=180;d+=10){
    const a=rad(d),long=(d%30===0);
    const r1=R*0.9,r2=R*0.9-(long?14:8);
    line(cx+Math.cos(a)*r1,cy-Math.sin(a)*r1,cx+Math.cos(a)*r2,cy-Math.sin(a)*r2);
    if(long)g.fillText(d+'',cx+Math.cos(a)*(R*0.9-26),cy-Math.sin(a)*(R*0.9-26)+3);
  }
  g.restore();
}
/* 小工具 */
function rad(deg){return deg*Math.PI/180;}
function line(x1,y1,x2,y2){g.beginPath();g.moveTo(x1,y1);g.lineTo(x2,y2);g.stroke();}
function circle(x,y,r){g.beginPath();g.arc(x,y,r,0,Math.PI*2);g.fill();}
function star(x,y,rO,rI){g.beginPath();for(let i=0;i<10;i++){const ang=Math.PI/5*i-Math.PI/2;const r=i%2?rI:rO;
  g[i?'lineTo':'moveTo'](x+Math.cos(ang)*r,y+Math.sin(ang)*r);}g.closePath();g.fill();}

/* 拖动转镜筒 */
let dragging=false,lastTickA=0;
function pointAngle(clientX,clientY){
  const r=cv.getBoundingClientRect();
  const dx=(clientX-r.left)-cx, dy=(clientY-r.top)-cy;
  let a=Math.atan2(-dy,dx)*180/Math.PI; // 逆时针为正
  return clampAngle(a);
}
cv.addEventListener('pointerdown',e=>{if(locked)return;dragging=true;angle=pointAngle(e.clientX,e.clientY);draw();});
addEventListener('pointermove',e=>{if(!dragging||locked)return;
  angle=pointAngle(e.clientX,e.clientY);
  if(Math.abs(angle-lastTickA)>=3){Sound.sfx.tick();lastTickA=angle;}
  draw();});
addEventListener('pointerup',()=>dragging=false);

const Game={
  load(){
    goal=GOALS[lv]; angle=10; // 初始镜筒统一贴近水平 10°
    locked=false;showProt=false;
    $('goalDeg').textContent=goal+'°';
    $('protractorBtn').textContent='量角器';
    $('protractorBtn').disabled=false;
    $('mainBtn').textContent='锁定';
    $('prog').textContent=lv+1;
    $('banner').classList.remove('show');
    $('readout').innerHTML='用手指拖动镜筒，凭感觉转到目标角度，再按「锁定」。';
    $('steps').innerHTML=GOALS.map((_,k)=>`<span class="dot ${k<lv?'done':k===lv?'now':''}"></span>`).join('');
    resize();
  },
  toggleProtractor(){if(locked)return;showProt=!showProt;
    $('protractorBtn').textContent=showProt?'收起量角器':'量角器';draw();},
  mainAction(){
    if(!locked){this.lockIn();}else{this.nextLevel();}
  },
  lockIn(){
    locked=true;Sound.sfx.lock();
    angle=Math.round(angle*100)/100; // 角度精确到小数点后两位
    const err=Math.round(Math.abs(angle-goal)*100)/100;
    let pts,grade,cls;
    if(err<=1){pts=10;grade='⭐ 完美对准';cls='var(--good)';Sound.sfx.great();}
    else if(err<=4){pts=8;grade='很准';cls='var(--good)';Sound.sfx.reveal();}
    else if(err<=9){pts=5;grade='接近';cls='var(--gold)';Sound.sfx.reveal();}
    else if(err<=18){pts=2;grade='还差点';cls='var(--copper-d)';Sound.sfx.poor();}
    else{pts=0;grade='偏太多';cls='var(--bad)';Sound.sfx.poor();}
    score+=pts;$('score').textContent=score;
    $('protractorBtn').disabled=true;
    $('mainBtn').textContent=(lv>=ROUND-1)?'看结果':'下一台 →';
    $('readout').innerHTML=`你转了 <b>${angle.toFixed(2)}°</b>，目标 <b>${goal}°</b>，误差 <b>${err.toFixed(2)}°</b>。`;
    const b=$('banner');
    b.innerHTML=`<div class="grade" style="color:${cls}">${grade}</div>`+
      `<div class="detail">你的角 <b>${angle.toFixed(2)}°</b> · 目标 <b>${goal}°</b><br>误差 ${err.toFixed(2)}° &nbsp;+${pts} 分</div>`;
    b.classList.add('show');
    draw();
    if(bannerTimer)clearTimeout(bannerTimer);
    bannerTimer=setTimeout(()=>b.classList.remove('show'),1700);
  },
  nextLevel(){
    if(bannerTimer){clearTimeout(bannerTimer);bannerTimer=null;}
    lv++;
    if(lv>=ROUND){this.finish();return;}
    this.load();
  },
  finish(){
    if(bannerTimer){clearTimeout(bannerTimer);bannerTimer=null;}
    Sound.sfx.win();
    const full=ROUND*10,star=score>=full*0.9?3:score>=full*0.6?2:1;
    const b=$('banner');
    b.innerHTML=`<div class="grade" style="color:var(--gold)">🔭 观测完成</div>`+
      `<div class="detail">${'★'.repeat(star)}${'☆'.repeat(3-star)}<br>`+
      `本轮得分 <b>${score}</b> / ${full}<br>`+
      `<button class="btn" style="margin-top:10px;padding:8px 18px;font-size:14px" onclick="Game.restart()">再来一轮</button></div>`;
    b.classList.add('show');b.classList.add('clickable');
    $('mainBtn').disabled=true;$('protractorBtn').disabled=true;
    $('readout').innerHTML='一轮结束，再练一次会更有手感。';
  },
  restart(){lv=0;score=0;GOALS=makeGoals();$('score').textContent=0;
    $('mainBtn').disabled=false;$('banner').classList.remove('clickable');this.load();},
  start(){$('total').textContent=ROUND;this.load();}
};

addEventListener('resize',resize);
Game.start();
</script>
