<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>数学游戏厅</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #2c3e50 0%, #4a569d 50%, #6a82fb 100%);
  min-height: 100vh;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  touch-action: manipulation;
}
h1 {
  font-size: 2.4em;
  margin-bottom: 0.2em;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  text-align: center;
}
.subtitle {
  font-size: 1.05em;
  opacity: 0.8;
  margin-bottom: 1.8em;
  text-align: center;
}
.game-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
  max-width: 420px;
}
.game-card {
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(255,255,255,0.15);
  border-radius: 18px;
  padding: 20px;
  cursor: pointer;
  text-decoration: none;
  color: #fff;
  transition: transform 0.2s, background 0.2s;
}
.game-card:hover { transform: scale(1.04); background: rgba(255,255,255,0.25); }
.game-card:active { transform: scale(0.97); }
.game-card .icon {
  font-size: 3em;
  flex-shrink: 0;
  width: 64px;
  text-align: center;
}
.game-card .info { flex: 1; }
.game-card .name { font-size: 1.3em; font-weight: bold; margin-bottom: 4px; }
.game-card .desc { font-size: 0.9em; opacity: 0.85; line-height: 1.4; }
.game-card .tag {
  display: inline-block;
  font-size: 0.75em;
  background: rgba(255,255,255,0.25);
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
}
.footer {
  margin-top: 2.5em;
  font-size: 0.85em;
  opacity: 0.6;
  text-align: center;
}
</style>
</head>
<body>
  <h1>🎮 数学游戏厅</h1>
  <p class="subtitle">初中数学趣味闯关</p>
  <div class="game-list">
    <a class="game-card" href="rational-number-classify.html">
      <div class="icon">🐾</div>
      <div class="info">
        <div class="name">有理数大冒险</div>
        <div class="desc">给小动物投喂数字，把有理数正确分类，解锁四大世界和隐藏伙伴。</div>
        <span class="tag">有理数分类</span>
      </div>
    </a>
    <a class="game-card" href="absolute-value/index.html">
      <div class="icon">💥</div>
      <div class="info">
        <div class="name">化简大作战</div>
        <div class="desc">怪物从四面八方扑来，身上写着待化简的式子。算出结果开炮击落，速度越来越快，看你能坚持多久！</div>
        <span class="tag">符号化简 · 绝对值</span>
      </div>
    </a>
  </div>
  <p class="footer">© 数学游戏厅</p>
</body>
</html>
