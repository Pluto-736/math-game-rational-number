const Flow={level:1,lives:3,score:0,combo:0,maxCombo:0,done:0,goal:8,numStr:'',numCb:null,startLevel(lv){if(lv>UI.unlocked)return;SFX.ensure();SFX.start();this.level=lv;this.lives=3;this.score=0;this.combo=0;this.maxCombo=0;this.done=0;this.goal=lv===3?4:8;this.numCb=null;UI.help(false);UI.show('game');const _g=document.getElementById('game');_g.classList.remove('lv1','lv2','lv3');_g.classList.add('lv'+lv);const _t=document.getElementById('toast');_t.classList.remove('show');_t.innerHTML='';document.getElementById('numpad').classList.remove('show');this.updateHud();if(lv===1)L1.start();else if(lv===2)L2.start();else L3.start()},stop(){L1.stop();L2.stop();L3.stop();this.numCb=null},retry(){this.startLevel(this.level)},stage(h){document.getElementById('stage').innerHTML=h},toast(txt,color){const t=document.getElementById('toast');t.innerHTML=txt;t.style.color=color||'#fff';t.classList.remove('show');void t.offsetWidth;t.classList.add('show')},right(msg){this.combo++;this.maxCombo=Math.max(this.maxCombo,this.combo);this.score+=10+Math.max(0,this.combo-1)*2;this.done++;SFX.right();this.updateHud();if(msg)this.toast(msg,'var(--gold)');return this.done>=this.goal?this.win():false},wrong(msg){this.combo=0;this.lives--;SFX.wrong();this.updateHud();this.toast(msg||'工厂警报：加工错了！','var(--red)');document.getElementById('stage').classList.add('shake');setTimeout(()=>document.getElementById('stage').classList.remove('shake'),360);if(this.lives<=0)this.over()},updateHud(){const h=document.getElementById('hearts');h.innerHTML='';for(let i=0;i<3;i++){const s=document.createElement('span');s.textContent='❤';if(i>=this.lives)s.className='lost';h.appendChild(s)}document.getElementById('score').textContent=this.score+' 分';document.getElementById('combo').textContent=this.combo>1?this.combo+' 连产':'';document.getElementById('prog').textContent='第'+this.level+'关 · '+UI.LV[this.level].name+'　'+Math.min(this.done,this.goal)+'/'+this.goal},win(){this.stop();SFX.win();if(this.level<2&&UI.unlocked<this.level+1){UI.unlocked=this.level+1;localStorage.setItem('mn_unlocked',UI.unlocked)}document.getElementById('overTitle').textContent='生产达标！';document.getElementById('overStats').innerHTML=(this.level>=2?'<b>🎉 已完成全部关卡！</b><br>':'<b>第'+this.level+'关通关</b><br>')+'得分 <b>'+this.score+'</b>　最高连产 <b>'+this.maxCombo+'</b>';setTimeout(()=>UI.show('over'),450);return true},over(){this.stop();SFX.over();document.getElementById('overTitle').textContent='机器停工';document.getElementById('overStats').innerHTML='第'+this.level+'关 · '+UI.LV[this.level].name+'<br>完成 <b>'+this.done+'</b>/'+this.goal+'　得分 <b>'+this.score+'</b>';setTimeout(()=>UI.show('over'),450)},buildNumpad(){const np=document.getElementById('numpad');np.innerHTML='';const d=document.createElement('div');d.id='numInput';np.appendChild(d);['-','1','2','3','4','5','6','7','8','9','0'].forEach(k=>{const b=document.createElement('button');b.className='nkey';b.textContent=k;b.onclick=()=>this.numKey(k);np.appendChild(b)});const del=document.createElement('button');del.className='nkey';del.textContent='⌫';del.onclick=()=>this.numKey('del');np.appendChild(del);const ok=document.createElement('button');ok.className='nkey ok';ok.textContent='✓';ok.onclick=()=>this.numSubmit();np.appendChild(ok)},askNum(label,cb){this.buildNumpad();this.numStr='';this.numCb=cb;document.getElementById('numInput').innerHTML='<span style="font-size:18px;opacity:.8;color:#fff;margin-right:8px">'+label+'</span>';document.getElementById('numpad').classList.add('show')},hideNum(){document.getElementById('numpad').classList.remove('show');this.numCb=null},numKey(k){if(!this.numCb)return;SFX.tap();if(k==='del')this.numStr=this.numStr.slice(0,-1);else if(k==='-')this.numStr=this.numStr.startsWith('-')?this.numStr.slice(1):'-'+this.numStr;else if(this.numStr.replace('-','').length<4)this.numStr+=k;const q=document.querySelector('#numInput span');document.getElementById('numInput').innerHTML=(q?q.outerHTML:'')+(this.numStr||'')},numSubmit(){if(!this.num const L1={cur:null,zeroUsed:false,timer:null,x:14,drag:false,gx:0,gy:0,lastSig:null,recentExp:[],start(){this.zeroUsed=false;this.lastSig=null;this.recentExp=[];this.render();this.next()},stop(){clearInterval(this.timer)},render(){Flow.stage('<div class="machine-title">幂能分拣线</div><div class="sort-wrap"><div class="sort-belt"><div id="sortChip" class="chip sort-chip"></div></div></div><div class="sorters"><div class="sorter" data-b="neg"><div class="chute negB">负数<br><small>结果 &lt; 0</small></div><div class="duct"></div><div class="silo"><div class="siloStack" data-s="neg"></div></div></div><div class="sorter" data-b="zero"><div class="chute zeroB">0<br><small>结果 = 0</small></div><div class="duct"></div><div class="silo"><div class="siloStack" data-s="zero"></div></div></div><div class="sorter" data-b="pos"><div class="chute posB">正数<br><small>结果 &gt; 0</small></div><div class="duct"></div><div class="silo"><div class="siloStack" data-s="pos"></div></div></div></div><div class="stepHint">拖动传送带上的芯片，从上方投入正确分拣口</div>')},next(){clearInterval(this.timer);this.x=14;let sig,tries=0;do{this.cur=Quiz.sign(this.zeroUsed);sig=this.cur.kind+'_'+(this.cur.exp%2);tries++}while(tries<40&&((this.cur.kind==='zero'&&this.zeroUsed)||sig===this.lastSig||this.recentExp.includes(this.cur.exp)));this.lastSig=sig;this.recentExp.push(this.cur.exp);if(this.recentExp.length>2)this.recentExp.shift();if(this.cur.kind==='zero')this.zeroUsed=true;const chip=document.getElementById('sortChip');chip.className='chip sort-chip';chip.innerHTML=this.cur.html;chip.style.opacity='1';chip.style.left=this.x+'px';chip.style.top='20px';this.bind(chip);this.timer=setInterval(()=>{if(this.drag)return;this.x+=2;chip.style.left=this.x+'px';if(this.x>document.querySelector('.sort-belt').clientWidth-120){clearInterval(this.timer);Flow.wrong('材料溜走了：'+this.cur.tip);setTimeout(()=>this.next(),600)}},35)},bind(chip){chip.onpointerdown=e=>{this.drag=true;chip.setPointerCapture(e.pointerId);const r=chip.getBoundingClient const L2={cur:null,queue:[],seen:null,emojiBag:[],prizes:[],lock:false,start(){this.seen=new Set();this.prizes=[];this.emojiBag=shuf(L2EMOJI.slice());const fourAt=rnd(0,Flow.goal-1);this.queue=[];for(let i=0;i<Flow.goal;i++)this.queue.push(i===fourAt?'four':'three');this.render();this.next()},stop(){this.lock=false},render(){Flow.stage('<div class="fix-stage"><div id="tray" class="tray"></div><div id="machine" class="machine"><div class="mPlate">⚙ 造 物 机 ⚙</div><span class="smoke">💨</span><span id="emojiOut" class="emojiOut"></span><div class="mount"><div id="bigGear" class="cog big broken"><div class="cogDisc"></div><div class="numBox">?</div></div></div><div class="chute"></div></div><div class="prizeBar"><span class="lbl">已造出</span><div id="prizeItems" class="items"></div><span id="prizeCnt" class="cnt">0</span></div></div><div class="stepHint">造物机器的齿轮损坏了，请你选择等值的齿轮进行更换。</div>')},next(){this.lock=false;const kind=this.queue[Flow.done];this.cur=kind==='four'?Quiz.equivFour():Quiz.equivAuto(this.seen);if(this.cur.sig)this.seen.add(this.cur.sig);const mac=document.getElementById('machine');mac.classList.remove('run','broke');const big=document.getElementById('bigGear');big.className='cog big broken';big.querySelector('.cogDisc').style.cssText='--gd:'+GEARGREY.d+';--gt:'+GEARGREY.t;big.querySelector('.numBox').innerHTML=this.cur.t;const tray=document.getElementById('tray');tray.innerHTML='';const opts=shuf(this.cur.opts.slice()),cols=shuf(GEARCOLORS.slice());opts.forEach((o,idx)=>{const g=document.createElement('div');g.className='cog cand trayGear';const c=cols[idx%cols.length];g.dataset.gd=c.d;g.dataset.gt=c.t;g.innerHTML='<div class="cogDisc" style="--gd:'+c.d+';--gt:'+c.t+'"></div><div class="numBox">'+o.h+'</div>';g.onclick=()=>this.judge(o,g);tray.appendChild(g)});this.setHint('造物机器的齿轮损坏了，请你选择等值的齿轮进行更换。')},setHint(txt){const h=document.querySelector('#stage .stepHint');if(h)h.innerHTML=txt},judge(o,g){if(this.lock)return;this.lock=true;SFX.tap();const mac=documen const L3={p:null,i:0,await:false,start(){this.render();this.next()},stop(){},render(){Flow.stage('<div class="machine-title">材料熔合炉</div><div class="expr-panel"><div id="expr"></div><div id="l3hint" class="stepHint">点击下一块该熔合的材料</div></div><div class="furnace">熔合炉</div><div id="materials" class="materials"></div>')},next(){this.p=Quiz.fusion();this.i=0;this.await=false;document.getElementById('expr').innerHTML=this.p.start;this.drawMats()},drawMats(){const m=document.getElementById('materials');m.innerHTML='';const right=this.p.steps[this.i].mat;let opts=[right];['2²','(-3)²','9 × 2','-4 + 18','18 ÷ 9','2 + (-8)','3 × 4','25 ÷ 5','12 - 5','5²'].forEach(x=>{if(opts.length<4&&x!==right)opts.push(x)});for(let i=opts.length-1;i>0;i--){const j=rnd(0,i);[opts[i],opts[j]]=[opts[j],opts[i]]}opts.forEach(x=>{const b=document.createElement('button');b.className='material';b.innerHTML=x;b.onclick=()=>this.pick(x,b);m.appendChild(b)})},pick(x,b){if(this.await)return;SFX.tap();const st=this.p.steps[this.i];if(x!==st.mat){Flow.wrong('顺序不对：请先找当前优先级最高的材料。');return}this.await=true;b.classList.add('hot');document.getElementById('l3hint').textContent='输入 '+st.mat+' 熔合后的得数';Flow.askNum(st.mat+' =',v=>this.submit(v))},submit(v){const st=this.p.steps[this.i];if(v!==st.ans){Flow.wrong('熔合失败：检查当前材料的运算顺序和符号。');return}Flow.hideNum();this.i++;document.getElementById('expr').innerHTML=st.next(this.i);document.getElementById('l3hint').textContent=st.tip;this.await=false;if(this.i>=this.p.steps.length){if(!Flow.right('最终晶体熔合完成！'))setTimeout(()=>this.next(),650)}else{SFX.right();setTimeout(()=>{document.getElementById('l3hint').textContent='点击下一块该熔合的材料';this.drawMats()},650)}}};
