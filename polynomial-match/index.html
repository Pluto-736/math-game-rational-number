<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>转动的整式 · 整式的相关概念</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Microsoft YaHei',sans-serif;color:#5a3d2b;touch-action:none;user-select:none}
body{background:linear-gradient(160deg,#ffe6f0 0%,#fff3d6 45%,#d8f7ec 100%)}
:root{--pink:#ff8fb1;--peach:#ffb37a;--mint:#5ad3a8;--sky:#6ec6ff;--grape:#b89cff;--sun:#ffd34d;--ink:#5a3d2b;--cream:#fffdf7}
#app{position:fixed;inset:0}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:18px}
.screen.show{display:flex}
.btn{font:900 17px inherit;border:0;border-radius:16px;padding:14px 26px;margin:7px;background:linear-gradient(#ffd76b,#ff9f43);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.18);box-shadow:0 5px 0 #e07d2a;cursor:pointer}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #e07d2a}
.btn.ghost{background:rgba(255,255,255,.6);color:#a05a3a;box-shadow:0 5px 0 rgba(0,0,0,.12)}
/* ENTRY */
#entry{overflow:hidden}
.bubble{position:absolute;border-radius:50%;opacity:.5;animation:float 7s ease-in-out infinite}
.b1{width:120px;height:120px;background:#ffd0e0;left:-30px;top:8%}
.b2{width:180px;height:180px;background:#ffe9b8;right:-50px;top:18%;animation-duration:9s}
.b3{width:90px;height:90px;background:#bff2df;left:12%;bottom:10%;animation-duration:6s}
.b4{width:140px;height:140px;background:#cfe9ff;right:14%;bottom:6%;animation-duration:8s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-26px)}}
.logo{font-size:46px;font-weight:1000;letter-spacing:2px;color:#fff;text-shadow:0 3px 0 #ff8fb1,0 6px 0 #ffb37a,0 8px 16px rgba(0,0,0,.18);z-index:2;text-align:center}
.logo small{display:block;font-size:15px;letter-spacing:4px;color:#a05a3a;text-shadow:none;margin-top:10px;font-weight:700}
.menu{width:100%;max-width:380px;display:flex;flex-direction:column;gap:13px;margin-top:26px;z-index:2}
.lv{display:flex;gap:14px;align-items:center;background:rgba(255,255,255,.72);border:3px solid #fff;border-radius:20px;padding:14px 16px;cursor:pointer;box-shadow:0 6px 16px rgba(255,140,170,.22)}
.lv:active{transform:scale(.98)}
.lv.locked{opacity:.5;cursor:not-allowed}
.lvNo{width:48px;height:48px;flex-shrink:0;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:25px;font-weight:1000;color:#fff}
.lv:nth-child(1) .lvNo{background:linear-gradient(#ff9fbb,#ff6f93)}
.lv:nth-child(2) .lvNo{background:linear-gradient(#74d0ff,#3aa6ff)}
.lv:nth-child(3) .lvNo{background:linear-gradient(#9be6c4,#3fc795)}
.lv.locked .lvNo{font-size:0}
.lv.locked .lvNo:after{content:'🔒';font-size:20px}
.lvName{font-size:17px;font-weight:900;margin-bottom:3px;color:#7a4a30}
.lvDesc{font-size:12px;line-height:1.45;opacity:.8}
.lvTip{font-size:12px;color:#e07d2a;margin-top:4px;font-weight:700}
.entry-foot{position:absolute;bottom:14px;font-size:13px;z-index:2}
.entry-foot a{color:#a05a3a;text-decoration:none;font-weight:700}
/* HUD */
#game{display:none}
#game.show{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0}
#hud{width:100%;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;flex-shrink:0}
.hudL,.hudR{display:flex;gap:8px;align-items:center}
.iconBtn{background:rgba(255,255,255,.65);border:0;color:#a05a3a;font-size:18px;border-radius:12px;padding:7px 9px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.1)}
.iconBtn:active{transform:translateY(2px)}
.score{font-weight:1000;color:#e07d2a;font-size:18px}
.hearts span{font-size:19px;margin-left:1px}
.hearts .lost{opacity:.25;filter:grayscale(1)}
#banner{width:100%;max-width:520px;text-align:center;padding:6px 14px 2px}
.bTitle{font-size:19px;font-weight:1000;color:#7a4a30}
.bInstr{font-size:15px;color:#c0577f;font-weight:700;margin-top:3px;min-height:21px}
.bInstr.lv2big{font-size:19px;line-height:1.5}
.bProg{font-size:12px;color:#a05a3a;opacity:.85;margin-top:2px}
/* BOARD */
#board{flex:1;width:100%;max-width:520px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px 14px;align-content:center;overflow:auto}
#board.boardTop{align-content:flex-start;padding-top:4px}
.tile{position:relative;aspect-ratio:1/1;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:1000;color:#fff;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.16),inset 0 2px 6px rgba(255,255,255,.4);transition:transform .12s}
.tile:active{transform:scale(.94)}
.tile small{font-size:.55em;vertical-align:super;position:relative;top:-.4em;line-height:0}
.tile.t0{background:linear-gradient(150deg,#ff9fbb,#ff6f93)}
.tile.t1{background:linear-gradient(150deg,#ffc885,#ff9a3d)}
.tile.t2{background:linear-gradient(150deg,#7ee0bb,#3fc795)}
.tile.t3{background:linear-gradient(150deg,#86cdff,#3aa6ff)}
.tile.t4{background:linear-gradient(150deg,#c4adff,#9b7bff)}
.tile.t5{background:linear-gradient(150deg,#ffd96b,#ffb627)}
.tile.sel{transform:scale(1.06);outline:5px solid #fff;box-shadow:0 0 0 7px #ffd34d,0 6px 0 rgba(0,0,0,.16)}
.tile.gone{animation:pop .34s ease forwards;pointer-events:none}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.22)}100%{transform:scale(0);opacity:0}}
.tile.bad{animation:nope .4s}
@keyframes nope{20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.tile.hole{visibility:hidden}
/* footer controls for L3 */
#tray{width:100%;max-width:520px;flex-shrink:0;padding:8px 14px 14px;display:none}
#tray.show{display:block}
.trayBox{min-height:54px;border-radius:16px;border:3px dashed #ffb37a;background:rgba(255,255,255,.55);display:flex;flex-wrap:wrap;gap:7px;align-items:center;justify-content:center;padding:8px;font-size:22px;font-weight:1000;color:#7a4a30}
.trayChip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:11px;background:#fff;box-shadow:0 2px 0 rgba(0,0,0,.12)}
.trayChip small{font-size:.55em;vertical-align:super;position:relative;top:-.4em}
.trayPlus{color:#c0577f;font-size:20px}
.trayBtns{display:flex;gap:10px;margin-top:8px}
.trayBtns .btn{flex:1;margin:0}
/* TOAST + masks */
#toast{position:absolute;top:30%;left:50%;transform:translateX(-50%);z-index:85;max-width:88%;text-align:center;font-size:18px;font-weight:1000;color:#fff;background:rgba(192,87,127,.95);border-radius:16px;padding:13px 20px;opacity:0;pointer-events:none}
#toast.ok{background:rgba(63,199,149,.96)}
#toast.show{animation:toast 1.5s ease forwards}
.soundHint{display:none;margin-top:auto;margin-bottom:10px;padding:7px 16px;font-size:13px;font-weight:800;color:var(--ink);background:rgba(255,211,77,.55);border-radius:14px;letter-spacing:.5px}
.soundHint.show{display:block}
@keyframes toast{0%{opacity:0;transform:translateX(-50%) scale(.8)}16%,78%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-20px)}}
.mask{position:absolute;inset:0;background:rgba(90,61,43,.55);display:none;align-items:center;justify-content:center;z-index:90;padding:22px}
.mask.show{display:flex}
#slotDlg{align-items:flex-end;padding-bottom:34px}
#slotDlg .modal{max-width:340px}
.modal{max-width:420px;width:100%;max-height:84vh;overflow:auto;background:var(--cream);border:4px solid #ffb37a;border-radius:24px;padding:24px}
.modal h2{text-align:center;color:#e07d2a;margin-bottom:10px}
.modal p{font-size:14px;line-height:1.8;margin:9px 0;color:#6b4a35}
.modal .hl{color:#c0577f;font-weight:900}
/* OVER */
#over{display:none}
#over.show{display:flex}
.overCard{background:var(--cream);border:4px solid #ffd34d;border-radius:26px;padding:28px 30px;text-align:center;max-width:380px;width:100%}
.overTitle{font-size:28px;color:#e07d2a;font-weight:1000;margin-bottom:14px}
.stars{font-size:34px;margin-bottom:10px}
.stats{line-height:2.1;font-size:16px;color:#6b4a35;margin-bottom:18px}
.stats b{color:#c0577f}
@media(max-height:660px){.logo{font-size:38px}.tile{font-size:20px}.modal p{font-size:13px}}
/* ===== 第1关 · 密码转盘 ===== */
.pmDialWrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.pmDial{position:relative;width:min(86vw,332px);aspect-ratio:1}
.pmSvg{width:100%;height:100%;display:block;overflow:visible}
.pmPic path{stroke:rgba(255,255,255,.5);stroke-width:1}
.pmInner path{fill:#f4e6cf;stroke:#e7cda2;stroke-width:1.5}
.pmInner text{font:900 15px 'Microsoft YaHei',sans-serif;fill:#b08a5f}
.pmInner path.lit{fill:#ffd34d;stroke:#e07d2a;stroke-width:3;animation:pmPulse 1s ease-in-out infinite}
.pmInner text.lit{fill:#7a4a30}
@keyframes pmPulse{0%,100%{filter:drop-shadow(0 0 2px #ffd34d)}50%{filter:drop-shadow(0 0 10px #ffb627)}}
.pmRing{transform-box:view-box;transform-origin:160px 160px;transition:transform .18s cubic-bezier(.2,.75,.25,1)}
.pmRing path{stroke:#fff;stroke-width:2.5;transition:opacity .35s}
.pmRing path.aim{stroke:#ffd34d;stroke-width:5}
.pmRing path.bad{stroke:#c0577f;stroke-width:5}
.pmRing path.done{opacity:0}
.pmLabelRing{position:absolute;inset:0;transform-origin:50% 50%;transition:transform .18s cubic-bezier(.2,.75,.25,1);pointer-events:none}
.pmLabel{position:absolute;transform:translate(-50%,-50%);text-align:center;pointer-events:none;transition:opacity .3s}
.pmLabel span{display:inline-block;transform-origin:50% 50%;transition:transform .18s cubic-bezier(.2,.75,.25,1);font-weight:1000;color:#fff;font-size:19px;text-shadow:0 1px 3px rgba(0,0,0,.4);white-space:nowrap}
.pmLabel span small{font-size:.6em;vertical-align:super;position:relative;top:-.4em}
.pmLabel.aim span{filter:drop-shadow(0 0 5px #ffd34d) drop-shadow(0 0 2px #fff)}
.pmLabel.done{opacity:0}
.pmLock{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:27%;height:27%;border-radius:50%;border:0;background:radial-gradient(circle at 50% 34%,#ffe391,#ff9f43);color:#fff;font:900 15px 'Microsoft YaHei',sans-serif;box-shadow:0 4px 0 #d97a25,0 6px 12px rgba(0,0,0,.28);cursor:pointer;line-height:1.15;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.pmLock:active{transform:translate(-50%,-50%) translateY(3px);box-shadow:0 1px 0 #d97a25}
.pmLock small{display:block;font-size:.72em;font-weight:700;opacity:.92}
.pmArrows{display:flex;gap:16px}
.pmArrow{min-width:104px;font-size:19px}
.pmChip{color:#fff;background:#c0577f;border-radius:8px;padding:1px 9px}
/* 拼图揭晓 */
#cele{background:rgba(90,61,43,.72)}
.celeBox{text-align:center;max-width:90%}
.celeImg{width:min(74vw,330px);height:min(74vw,330px);border-radius:50%;object-fit:cover;box-shadow:0 12px 34px rgba(0,0,0,.4),0 0 0 6px rgba(255,255,255,.9),0 0 0 12px rgba(255,211,77,.75);animation:celePop .7s cubic-bezier(.2,1.35,.4,1)}
@keyframes celePop{0%{transform:scale(.15);opacity:0}55%{opacity:1}100%{transform:scale(1)}}
.celeCap{margin:22px auto 4px;font-size:22px;font-weight:1000;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.45);animation:celeCap .55s ease .4s both}
@keyframes celeCap{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
#cele .btn{animation:celeCap .55s ease .7s both}
/* 第2关 · 整式老虎机 */
.slot{position:relative;width:100%;max-width:334px;margin:2px auto 0;padding:0 28px 0 0}
.slotBody{position:relative;background:linear-gradient(#ffcf5d,#ff8f2e 60%,#f07a1c);border-radius:26px 26px 22px 22px;padding:17px 16px 19px;box-shadow:0 14px 0 #c96f1e,0 22px 32px rgba(0,0,0,.32),inset 0 2px 3px rgba(255,255,255,.5),inset 0 -6px 12px rgba(150,70,10,.35);border:3px solid #ffe6a8}
/* 顶部招牌 + 跑马灯灯泡 */
.slotCrown{position:relative;background:linear-gradient(#b3312f,#8c1f24);border-radius:16px;padding:12px 10px 11px;text-align:center;box-shadow:inset 0 2px 6px rgba(0,0,0,.4),0 3px 0 #6d161a;margin-bottom:15px;border:2px solid #ffcf5d}
.slotBulbs{position:absolute;inset:3px;border-radius:13px;pointer-events:none}
.slotBulbs i{position:absolute;width:7px;height:7px;border-radius:50%;background:#ffe27a;box-shadow:0 0 6px 2px rgba(255,214,80,.9);animation:bulb 1s steps(1) infinite}
.slotBulbs i:nth-child(2n){animation-delay:.5s}
@keyframes bulb{0%{opacity:1}50%{opacity:.25}100%{opacity:1}}
.slotTop{position:relative;font-size:14px;font-weight:900;color:#ffe9c2;text-shadow:0 1px 2px rgba(0,0,0,.4);z-index:1}
.slotTop b{display:inline-block;background:linear-gradient(#fff,#ffe7bd);color:#c0392b;border-radius:9px;padding:2px 12px;font-size:19px;margin-left:4px;box-shadow:0 2px 4px rgba(0,0,0,.3)}
/* 显示窗 */
.slotWin{position:relative;background:linear-gradient(#20150d,#2f2013);border:4px solid #7a4a1e;border-radius:14px;height:132px;padding:0;box-shadow:inset 0 3px 14px rgba(0,0,0,.75),inset 0 0 0 2px rgba(255,190,90,.15);overflow:hidden}
.slotWin:before{content:'';position:absolute;top:0;left:0;right:0;height:42%;background:linear-gradient(rgba(255,255,255,.14),transparent);pointer-events:none;z-index:2}
.slotGlass{position:absolute;inset:0;border-radius:10px;box-shadow:inset 0 0 26px rgba(0,0,0,.6);pointer-events:none;z-index:3}
.slotReel{position:absolute;left:0;right:0;top:0;z-index:1;will-change:transform}
.slotReel.spin{transition:transform 1.05s cubic-bezier(.08,.72,.15,1)}
.slotReel.blur .slotPoly{filter:blur(1.4px);opacity:.9}
.slotRow{height:132px;display:flex;align-items:center;justify-content:center;padding:0 12px}
.slotPoly{position:relative;font-size:23px;font-weight:1000;color:#ffe08a;letter-spacing:.3px;text-shadow:0 0 12px rgba(255,196,72,.6);white-space:nowrap;z-index:1}
.slotPoly small{font-size:.58em;vertical-align:super;position:relative;top:-.42em;line-height:0}
/* 金币出口托盘 */
.slotBase{margin-top:16px}
.slotCoins{position:relative;text-align:center;font-size:18px;font-weight:1000;color:#5a3d2b;background:linear-gradient(#fff6df,#ffe6b0);border-radius:11px;padding:9px 4px;margin-bottom:13px;box-shadow:inset 0 2px 5px rgba(150,90,20,.3),0 2px 0 rgba(255,255,255,.4);border:2px solid #e7b96a}
.slotCoins.bump{animation:coinBump .42s}
@keyframes coinBump{0%{transform:scale(1)}42%{transform:scale(1.2);color:#e07d2a}100%{transform:scale(1)}}
/* CSS 画的金币（避免 emoji 在部分手机渲染成银色）*/
.coin{display:inline-block;width:19px;height:19px;border-radius:50%;background:radial-gradient(circle at 36% 30%,#fff0a8,#f7c02e 55%,#cf8f12);box-shadow:inset 0 -2px 3px rgba(140,85,8,.5),0 1px 2px rgba(0,0,0,.3);vertical-align:-3px;position:relative}
.coin:after{content:'';position:absolute;inset:3px;border-radius:50%;border:1.5px solid rgba(150,95,10,.5)}
.slotBtns{display:flex;gap:11px}
.slotBtn{flex:1;font:900 18px 'Microsoft YaHei',sans-serif;border:0;border-radius:15px;padding:16px 0;color:#fff;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.28),inset 0 2px 4px rgba(255,255,255,.35);text-shadow:0 1px 2px rgba(0,0,0,.28);border:2px solid rgba(255,255,255,.4)}
.slotBtn:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,.28)}
.slotBtn.ok{background:linear-gradient(#7fe6a0,#28bd5e)}
.slotBtn.re{background:linear-gradient(#ffa0b2,#f0566f)}
/* 右侧拨杆：竖直，向下压后回弹 */
.slotArm{position:absolute;right:2px;top:40px;width:20px;height:158px}
.slotArm .rod{position:absolute;left:50%;bottom:0;transform:translateX(-50%);transform-origin:bottom center;width:12px;height:124px;background:linear-gradient(#e9e9f2,#9a9aac);border-radius:6px;box-shadow:0 2px 4px rgba(0,0,0,.3);transition:height .18s cubic-bezier(.3,1.5,.5,1)}
.slotArm .knob{position:absolute;left:50%;top:-5px;transform:translateX(-50%);width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 36% 30%,#ff9a9a,#d1302f);box-shadow:0 3px 6px rgba(0,0,0,.4),inset 0 -3px 5px rgba(120,10,10,.5)}
.slotArm .socket{position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);width:24px;height:15px;border-radius:7px;background:linear-gradient(#c96f1e,#8c4c12);box-shadow:inset 0 2px 3px rgba(0,0,0,.4)}
.slot.pull .rod{height:66px}
.slot.shake .slotBody{animation:slotShake .42s}
@keyframes slotShake{0%,100%{transform:translateX(0)}18%{transform:translateX(-9px)}38%{transform:translateX(9px)}58%{transform:translateX(-6px)}78%{transform:translateX(6px)}}
.coinFly{position:absolute;left:50%;bottom:74px;width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 36% 30%,#fff0a8,#f7c02e 55%,#cf8f12);box-shadow:inset 0 -3px 4px rgba(140,85,8,.5),0 2px 4px rgba(0,0,0,.35);pointer-events:none;z-index:5;animation:coinFly .8s ease forwards}
.coinFly:after{content:'';position:absolute;inset:5px;border-radius:50%;border:2px solid rgba(150,95,10,.5)}
@keyframes coinFly{0%{transform:translate(-50%,-90px) scale(.4) rotate(0);opacity:0}30%{opacity:1}100%{transform:translate(-50%,0) scale(1.1) rotate(300deg);opacity:0}}
</style>

<body><div id="app">
<div id="entry" class="screen show">
  <div class="bubble b1"></div><div class="bubble b2"></div><div class="bubble b3"></div><div class="bubble b4"></div>
  <div class="logo">转动的整式<small>整 式 的 相 关 概 念</small></div>
  <div id="levelMenu" class="menu"></div>
  <button class="btn ghost" onclick="UI.help(true)">玩法说明</button>
  <div class="entry-foot"><a href="../index.html">← 返回游戏厅</a></div>
</div>

<div id="helpMask" class="mask"><div class="modal">
  <h2>玩法说明</h2>
  <p><span class="hl">第1关 · 次数转盘</span>：看顶部指令，把<span class="hl">次数</span>符合要求的式子转到发光凹槽，按中间「确认」放进去；拼满一整轮就点亮一张隐藏图，共 4 轮。</p>
  <p><span class="hl">第2关 · 整式老虎机</span>：招牌写着要「几次几项式」。拨动摇杆，屏上摇出一个整式——<span class="hl">项数</span>看有几项、<span class="hl">次数</span>看最高次的那一项。判断它符合就按「确认」得金币，判断它不符就按「淘汰」；<span class="hl">无论哪个键，只要判断错了就扣一颗心</span>。集齐 5 枚金币过关。</p>
  <button class="btn" style="display:block;margin:16px auto 0" onclick="UI.help(false)">明白啦</button>
</div></div>

<div id="slotDlg" class="mask"><div class="modal" style="max-width:340px;text-align:center">
  <h2 style="color:#e05a5a">判断错了</h2>
  <p id="slotDlgMsg" style="text-align:center;font-size:15px">—</p>
  <button class="btn" style="display:block;margin:14px auto 0" onclick="L3.dlgOk()">确定</button>
</div></div>

<div id="game" class="screen">
  <div id="hud">
    <div class="hudL"><button class="iconBtn" onclick="UI.toEntry()">🏠</button><button id="muteBtn" class="iconBtn" onclick="SFX.toggle()">🔊</button></div>
    <div id="score" class="score">0 分</div>
    <div class="hudR"><span id="hearts" class="hearts"></span></div>
  </div>
  <div id="banner"><div id="bTitle" class="bTitle"></div><div id="bInstr" class="bInstr"></div><div id="bProg" class="bProg"></div></div>
  <div id="board"></div>
  <div id="tray"><div id="trayBox" class="trayBox"></div><div class="trayBtns"><button class="btn ghost" onclick="L3.clear()">清空</button><button class="btn" onclick="L3.submit()">提交验收</button></div></div>

<script>
// iPhone 的合成音会被侧边静音开关掐掉，仅对 iPhone 显示"关静音"提示
if(/iPhone|iPod/.test(navigator.userAgent))document.getElementById('soundHint').classList.add('show');
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]]}return a};
const sup=e=>e===1?'':'<small>'+e+'</small>';
/* 转盘用：极坐标(0°在正上方、顺时针) + SVG 环形扇区路径 */
const P=(r,a)=>{a=a*Math.PI/180;return[160+r*Math.sin(a),160-r*Math.cos(a)]};
function sector(r0,r1,a0,a1){const f=n=>n.toFixed(2);const[xo0,yo0]=P(r1,a0),[xo1,yo1]=P(r1,a1),[xi1,yi1]=P(r0,a1),[xi0,yi0]=P(r0,a0);const lg=(a1-a0)>180?1:0;return `M${f(xo0)},${f(yo0)} A${r1},${r1} 0 ${lg} 1 ${f(xo1)},${f(yo1)} L${f(xi1)},${f(yi1)} A${r0},${r0} 0 ${lg} 0 ${f(xi0)},${f(yi0)} Z`;}

/* ===== 单项式数据模型 =====
   m = {coef, vars:[['x',2],['y',1]], deg, key, html}
   key = 字母部分签名(用于同类项判断); deg = 次数 */
function makeMono(coef,vars){
  vars=vars.filter(v=>v[1]>0).sort((a,b)=>a[0]<b[0]?-1:1);
  const deg=vars.reduce((s,v)=>s+v[1],0);
  const key=vars.map(v=>v[0]+v[1]).join('')||'#const';
  // 系数部分文字
  let cTxt;
  if(vars.length===0){cTxt=String(coef);}      // 常数项
  else if(coef===1)cTxt='';
  else if(coef===-1)cTxt='-';
  else cTxt=String(coef);
  const vTxt=vars.map(v=>v[0]+sup(v[1])).join('');
  return {coef,vars,deg,key,html:cTxt+vTxt};
}
// 数字的若干次方：本质是常数项，次数为 0（转盘关用作迷惑学生的干扰项）
function makeNumPow(base,exp){
  const neg=base<0;
  const html=(neg?'('+base+')':String(base))+sup(exp);
  return {coef:Math.pow(base,exp),vars:[],deg:0,key:'#const',html,isNumPow:true};
}
// 含 π 的项：π 是常数，只当系数，次数只看字母（2πx 次数1、πab 次数2、单独 π/2π 次数0）
// n 为 π 前的数字倍数；vars 为字母部分（可空表示纯常数 π 项）
function makePi(n,vars){
  vars=vars.filter(v=>v[1]>0).sort((a,b)=>a[0]<b[0]?-1:1);
  const deg=vars.reduce((s,v)=>s+v[1],0);
  const key=vars.map(v=>v[0]+v[1]).join('')||'#const';
  let cTxt;
  if(n===1)cTxt='π';else if(n===-1)cTxt='-π';else cTxt=n+'π';
  const vTxt=vars.map(v=>v[0]+sup(v[1])).join('');
  return {coef:n+'π',vars,deg,key,html:cTxt+vTxt,isPi:true};
}
const SFX={ctx:null,muted:false,bgm:null,step:0,
  ensure(){if(!this.ctx){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){this.ctx=null}}if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume()},
  beep(f,d,t='sine',v=.12){if(this.muted||!this.ctx)return;const c=this.ctx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.setValueAtTime(f,n);g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(.001,n+d);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+d)},
  slide(a,b,d,t='sine',v=.13){if(this.muted||!this.ctx)return;const c=this.ctx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.setValueAtTime(a,n);o.frequency.exponentialRampToValueAtTime(b,n+d);g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(.001,n+d);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+d)},
  tap(){this.beep(660,.05,'sine',.06)},
  click(){this.beep(1250,.03,'square',.05)},
  right(){this.slide(620,1040,.14,'sine',.13)},
  wrong(){this.slide(300,90,.26,'triangle',.16)},
  win(){[523,659,784,1046].forEach((f,i)=>setTimeout(()=>this.beep(f,.18),i*100))},
  over(){[440,349,294,233].forEach((f,i)=>setTimeout(()=>this.beep(f,.26,'triangle'),i*140))},
  startBgm(){if(this.bgm||!this.ctx)return;
    // 轻快糖果旋律(C大调五声) + 低八度伴奏
    const mel=[523,587,659,784,659,587,523,587,659,523,440,523,587,659,784,880,784,659,587,523];
    this.step=0;
    this.bgm=setInterval(()=>{if(!this.muted){const f=mel[this.step%mel.length];this.beep(f,.22,'triangle',.05);if(this.step%2===0)this.beep(f/2,.3,'sine',.03)}this.step++},300)},
  stopBgm(){if(this.bgm){clearInterval(this.bgm);this.bgm=null}},
  toggle(){this.muted=!this.muted;document.getElementById('muteBtn').textContent=this.muted?'🔇':'🔊';if(this.muted)this.stopBgm();else if(document.getElementById('game').classList.contains('show'))this.startBgm()}};
const UI={
  LV:[null,
    {name:'次数转盘',desc:'转动转盘，按次数拼出整幅图',tip:'看指令次数 · 转到发光槽'},
    {name:'整式老虎机',desc:'拨摇杆看整式，判断几次几项式',tip:'项数看几项 · 次数看最高次'}],
  unlocked:Math.min(2,Math.max(1,+(localStorage.getItem('pm_unlocked')||1))),
  show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('show'));document.getElementById(id).classList.add('show')},
  help(on){document.getElementById('helpMask').classList.toggle('show',on)},
  toEntry(){Flow.stop();this.renderMenu();this.show('entry')},
  renderMenu(){const m=document.getElementById('levelMenu');m.innerHTML='';for(let lv=1;lv<=2;lv++){const locked=lv>this.unlocked,c=document.createElement('div');c.className='lv'+(locked?' locked':'');c.innerHTML='<div class="lvNo">'+lv+'</div><div><div class="lvName">第'+lv+'关 · '+this.LV[lv].name+'</div><div class="lvDesc">'+this.LV[lv].desc+'</div><div class="lvTip">'+(locked?'通关上一关解锁':this.LV[lv].tip)+'</div></div>';if(!locked)c.onclick=()=>Flow.startLevel(lv);m.appendChild(c)}}
};
const Flow={level:1,lives:3,score:0,
  startLevel(lv){if(lv>UI.unlocked)return;SFX.ensure();SFX.startBgm();this.level=lv;this.lives=3;this.score=0;UI.help(false);document.getElementById('toast').classList.remove('show');document.getElementById('slotDlg').classList.remove('show');UI.show('game');document.getElementById('tray').classList.toggle('show',false);document.getElementById('bInstr').classList.toggle('lv2big',lv===1);this.updateHud();const L=[null,L2,L3][lv];L.start()},
  stop(){SFX.stopBgm()},
  retry(){this.startLevel(this.level)},
  next(){const lv=this.level<2?this.level+1:1;this.startLevel(lv)},
  banner(title,instr){document.getElementById('bTitle').textContent=title;document.getElementById('bInstr').innerHTML=instr||''},
  prog(t){document.getElementById('bProg').textContent=t||''},
  toast(txt,ok){const t=document.getElementById('toast');t.innerHTML=txt;t.classList.toggle('ok',!!ok);t.classList.remove('show');void t.offsetWidth;t.classList.add('show')},
  addScore(n){this.score+=n;this.updateHud()},
  loseLife(){this.lives--;SFX.wrong();this.updateHud();if(this.lives<=0){this.over();return true}return false},
  updateHud(){const h=document.getElementById('hearts');h.innerHTML='';for(let i=0;i<3;i++){const s=document.createElement('span');s.textContent='❤';if(i>=this.lives)s.className='lost';h.appendChild(s)}document.getElementById('score').textContent=this.score+' 分'},
  win(){SFX.stopBgm();SFX.win();if(this.level<2&&UI.unlocked<this.level+1){UI.unlocked=this.level+1;localStorage.setItem('pm_unlocked',UI.unlocked)}const star=this.lives;document.getElementById('stars').textContent='⭐'.repeat(star)+'☆'.repeat(3-star);document.getElementById('overTitle').textContent=this.level<2?'第'+this.level+'关 · 过关！':'全部通关！';document.getElementById('overStats').innerHTML='得分 <b>'+this.score+'</b>　剩余 <b>'+this.lives+'</b> ❤';setTimeout(()=>UI.show('over'),520)},
  over(){SFX.stopBgm();SFX.over();document.getElementById('stars').textContent='💔';document.getElementById('overTitle').textContent='心碎啦';document.getElementById('overStats').innerHTML='第'+this.level+'关 · '+UI.LV[this.level].name+'<br>得分 <b>'+this.score+'</b>';setTimeout(()=>UI.show('over'),520)}
};
/* ===== 同类项消消（已暂时移出关卡，代码保留待搬迁，当前不引用） ===== */
const L1={tiles:[],sel:null,busy:false,
  gen(){
    // 候选字母组合（字母部分）→ 同类项靠这个签名判定
    const families=[
      [['x',1]],[['y',1]],[['a',1]],[['b',1]],
      [['x',2]],[['y',2]],[['a',2]],
      [['x',1],['y',1]],[['a',1],['b',1]],[['x',2],['y',1]],
      [['m',1]],[['n',2]],[]  // [] 表示常数项
    ];
    // π 常数作为候选之一参与抽取（与数字常数同类，可能出现也可能不出现，不强制）
    // 候选里只保留 π 作为常数类，去掉数字常数[]，避免两者同 key 混堆
    const fams=families.filter(v=>v.length>0).map(v=>({vars:v,pi:false}));
    fams.push({vars:[],pi:true}); // π 常数组
    const chosen=shuffle(fams).slice(0,8); // 8 组各 2 个 = 16 格，刚好填满 4×4
    const coefs=[2,3,4,5,-2,-3,-4,1,-1,6,-5];
    const piNs=[1,2,3,-1,-2];
    let tiles=[];
    chosen.forEach(fam=>{
      const used=[];
      for(let i=0;i<2;i++){
        if(fam.pi){let n;do{n=pick(piNs)}while(used.includes(n)&&used.length<piNs.length);used.push(n);tiles.push(makePi(n,[]));}
        else{let c;do{c=pick(coefs)}while(used.includes(c)&&used.length<coefs.length);used.push(c);tiles.push(makeMono(c,fam.vars.map(v=>[v[0],v[1]])));}
      }
    });
    return shuffle(tiles);
  },
  start(){this.sel=null;this.busy=false;this.tiles=this.gen();Flow.banner('同类项消消','点两个同类项，一起消掉');this.render();this.updateProg()},
  updateProg(){const left=this.tiles.filter(t=>!t.gone).length;Flow.prog('剩余方块 '+left+' 个 · 全部消完过关')},
  render(){const b=document.getElementById('board');b.classList.remove('boardTop');b.style.gridTemplateColumns='repeat(4,1fr)';b.innerHTML='';this.tiles.forEach((t,i)=>{const d=document.createElement('div');d.className='tile t'+(i%6);d.innerHTML=t.html;d.dataset.i=i;d.onclick=()=>this.tap(i,d);b.appendChild(d)})},
  tap(i,el){if(this.busy)return;const t=this.tiles[i];if(t.gone)return;SFX.tap();
    if(this.sel===null){this.sel=i;el.classList.add('sel');return}
    if(this.sel===i){el.classList.remove('sel');this.sel=null;return}
    const prev=this.tiles[this.sel],prevEl=document.querySelector('.tile[data-i="'+this.sel+'"]');
    if(prev.key===t.key){
      // 同类项，消除
      this.busy=true;prevEl.classList.remove('sel');
      [prevEl,el].forEach(x=>x.classList.add('gone'));prev.gone=t.gone=true;
      SFX.right();Flow.addScore(10);this.sel=null;
      setTimeout(()=>{[prevEl,el].forEach(x=>x.classList.add('hole'));this.busy=false;this.updateProg();if(this.tiles.every(x=>x.gone))Flow.win()},340);
    }else{
      // 不是同类项
      prevEl.classList.remove('sel');el.classList.add('bad');this.sel=null;
      setTimeout(()=>el.classList.remove('bad'),420);
      Flow.toast('不是同类项：字母或指数不同',false);
      if(Flow.loseLife())return;
    }
  }
};
/* ===== 第1关 · 密码转盘（按次数拼图） ===== */
const L2={total:4,round:0,busy:false,ringStep:0,turn:0,litInner:0,picIndex:-1,
  pics:[
    {src:'img/ring1.jpg',cap:'恭喜你，流转了四季！'},
    {src:'img/ring2.jpg',cap:'恭喜你，点亮了满天星座！'},
    {src:'img/ring3.jpg',cap:'恭喜你，尝遍了人间至味！'},
    {src:'img/ring4.jpg',cap:'恭喜你，潜入了深蓝海洋！'},
    {src:'img/ring5.jpg',cap:'恭喜你，环游了整个世界！'},
    {src:'img/ring6.jpg',cap:'恭喜你，读通了魔法典籍！'},
    {src:'img/ring7.jpg',cap:'恭喜你，窥见了微观生命！'},
    {src:'img/ring8.jpg',cap:'恭喜你，飞越了天空乐园！'},
    {src:'img/ring9.jpg',cap:'恭喜你，接续了文明薪火！'},
    {src:'img/ring10.jpg',cap:'恭喜你，见证了机械脉动！'}
  ],   // 图库；每局从中随机抽 total 张（见 start）
  deck:[],
  innerDeg:[0,1,2,3,0,1,2,3],
  cells:[],tiles:[],labels:[],innerPaths:[],innerTexts:[],
  genBoard(){
    // 外圈 8 格：保证 1/2/3 次各至少一个；常数项(次数=0)只放 1~2 个，
    // 若 2 个则来自不同类别(纯数字/数字幂/π常数)，避免俩长得像
    const coefs=[2,3,4,5,-2,-3,-4,1,-1,6];
    const byDeg={
      1:[[['x',1]],[['y',1]],[['a',1]],[['m',1]],[['b',1]]],
      2:[[['x',2]],[['a',2]],[['x',1],['y',1]],[['a',1],['b',1]],[['y',2]]],
      3:[[['x',3]],[['x',2],['y',1]],[['a',2],['b',1]]]
    };
    const mono=d=>makeMono(pick(coefs),pick(byDeg[d]).map(v=>[v[0],v[1]]));
    // 三类"次数=0"的常数项生成器
    const constGen={
      num:()=>makeMono(pick([5,-5,7,-7,4,6,-6]),[]),        // 纯数字
      pow:()=>makeNumPow(pick([2,3,-2,-3]),pick([2,3])),    // 数字幂 2³：看着像高次，其实 0 次
      pi:()=>makePi(pick([1,2,-1,3]),[])                    // π 常数 2π
    };
    let out=[];
    // 常数项 1~2 个：数字幂陷阱必留；若 2 个，第二个取不同类别
    const cats=['pow'];
    if(pick([1,2])===2)cats.push(pick(['num','pi']));
    cats.forEach(k=>out.push(constGen[k]()));
    [1,2,3].forEach(d=>out.push(mono(d)));                       // 保证 1/2/3 次各一
    // 带字母的 π 项(1/2 次，不算常数)——保留"π 只当系数"的陷阱
    out.push(makePi(pick([1,2,-1,3]),pick([[['x',1]],[['r',1]],[['a',1],['b',1]],[['x',2]]]).map(v=>[v[0],v[1]])));
    while(out.length<8)out.push(mono(pick([1,2,3])));           // 其余用 1/2/3 次补满
    return shuffle(out);
  },
  start(){this.round=0;this.picIndex=-1;this.deck=shuffle(this.pics.slice()).slice(0,this.total);Flow.banner('按次数拼图','');this.newPic()},
  newPic(){this.busy=false;this.ringStep=0;this.turn=0;this.picIndex++;
    this.cells=this.genBoard().map(m=>({m,done:false}));
    this.render();this.apply();this.litNext()},
  render(){
    const b=document.getElementById('board');b.classList.remove('boardTop');
    const src=(this.deck[this.picIndex]||0).src;
    // 揭示层：真图/占位色环都只画在外圈料带(98-150)，且随转盘一起转，
    // 由 pmDone 裁剪——只有"已拼好的格子"那几块才可见，转动时也偷看不到其它块
    let reveal;
    if(src){
      reveal=`<image href="${src}" x="10" y="10" width="300" height="300" preserveAspectRatio="xMidYMid slice"/>`;
    }else{
      const hb=[18,150,275][this.picIndex%3];
      reveal='';for(let i=0;i<8;i++){const a=i*45;
        reveal+=`<path d="${sector(98,150,a-22.5,a+22.5)}" fill="hsl(${(hb+i*32)%360},64%,64%)"/>`;}
    }
    const cols=['#ff6f93','#ff9a3d','#3fc795','#3aa6ff','#9b7bff','#ffb627','#ff6f93','#3fc795'];
    let outer='';for(let i=0;i<8;i++){const a=i*45;outer+=`<path fill="${cols[i]}" d="${sector(98,150,a-22.5,a+22.5)}"/>`;}
    let inner='';for(let j=0;j<8;j++){const a=j*45;inner+=`<path d="${sector(54,92,a-22.5,a+22.5)}"/>`;
      const[tx,ty]=P(73,a);inner+=`<text x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" dominant-baseline="central" text-anchor="middle">${this.innerDeg[j]}次</text>`;}
    let labs='';for(let i=0;i<8;i++){const[x,y]=P(124,i*45);
      labs+=`<div class="pmLabel" style="left:${(x/320*100).toFixed(2)}%;top:${(y/320*100).toFixed(2)}%"><span>${this.cells[i].m.html}</span></div>`;}
    b.innerHTML=`<div class="pmDialWrap" style="grid-column:1/-1;justify-self:center">
      <div class="pmDial">
        <svg viewBox="0 0 320 320" class="pmSvg">
          <defs>
            <clipPath id="pmDone"></clipPath>
            <radialGradient id="pmBase" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#fff7e6"/><stop offset="62%" stop-color="#f5e6c8"/><stop offset="100%" stop-color="#e8d1a2"/>
            </radialGradient>
          </defs>
          <circle cx="160" cy="160" r="150" fill="url(#pmBase)"/>
          <g class="pmInner">${inner}</g>
          <g class="pmRing">
            <g class="pmReveal" clip-path="url(#pmDone)">${reveal}</g>
            <g class="pmCovers">${outer}</g>
          </g>
        </svg>
        <div class="pmLabelRing">${labs}</div>
        <button class="pmLock" onclick="L2.lock()">确认</button>
      </div>
      <div class="pmArrows">
        <button class="btn ghost pmArrow" onclick="L2.rotate(-1)">◀ 转</button>
        <button class="btn ghost pmArrow" onclick="L2.rotate(1)">转 ▶</button>
      </div>
    </div>`;
    this.$ring=b.querySelector('.pmRing');this.$lring=b.querySelector('.pmLabelRing');
    this.$done=b.querySelector('#pmDone');
    this.tiles=[...b.querySelectorAll('.pmCovers path')];
    this.labels=[...this.$lring.querySelectorAll('.pmLabel')];
    this.innerPaths=[...b.querySelectorAll('.pmInner path')];
    this.innerTexts=[...b.querySelectorAll('.pmInner text')];
  },
  apply(){const a=this.turn;
    this.$ring.style.transform='rotate('+a+'deg)';
    this.$lring.style.transform='rotate('+a+'deg)';
    this.labels.forEach(l=>l.querySelector('span').style.transform='rotate('+(-a)+'deg)');
    this.updateAim()},
  updateAim(){const ai=(this.litInner-this.ringStep+8)%8;
    this.tiles.forEach((t,i)=>t.classList.toggle('aim',i===ai&&!this.cells[i].done));
    this.labels.forEach((l,i)=>l.classList.toggle('aim',i===ai&&!this.cells[i].done))},
  setLit(L){this.innerPaths.forEach((p,j)=>p.classList.toggle('lit',j===L));
    this.innerTexts.forEach((t,j)=>t.classList.toggle('lit',j===L));
    this.litInner=L;const d=this.innerDeg[L];
    Flow.banner('按次数拼图','把 <span class="pmChip">次数 = '+d+'</span> 的式子转到<b style="color:#e07d2a">发光凹槽</b>，按中间「确认」');
    this.updateAim()},
  litNext(){const rem=this.cells.filter(c=>!c.done);
    if(!rem.length){this.onPicDone();return}
    const degs=[...new Set(rem.map(c=>c.m.deg))];
    const d=pick(degs);const opts=[];this.innerDeg.forEach((dd,j)=>{if(dd===d)opts.push(j)});
    this.setLit(pick(opts));
    Flow.prog('第 '+(this.round+1)+'/'+this.total+' 张 · 还差 '+rem.length+' 块')},
  rotate(dir){if(this.busy)return;this.ringStep=(this.ringStep+dir+8)%8;this.turn+=dir*45;SFX.click();this.apply()},
  lock(){if(this.busy)return;const ai=(this.litInner-this.ringStep+8)%8;const c=this.cells[ai];
    if(c.done){Flow.toast('这个凹槽已经拼好啦，转到还没拼的式子上',false);return}
    if(c.m.deg===this.innerDeg[this.litInner]){
      c.done=true;SFX.right();SFX.click();Flow.addScore(8);
      // 把这一格登记进"已拼"裁剪区：图块随即出现在褪去的料下面（露出这块图）
      const a=ai*45,pth=document.createElementNS('http://www.w3.org/2000/svg','path');
      pth.setAttribute('d',sector(98,150,a-22.5,a+22.5));this.$done.appendChild(pth);
      this.tiles[ai].classList.remove('aim');this.tiles[ai].classList.add('done');
      this.labels[ai].classList.remove('aim');this.labels[ai].classList.add('done');
      if(this.cells.every(x=>x.done))this.onPicDone();else this.litNext();
    }else{
      const el=this.tiles[ai];el.classList.add('bad');setTimeout(()=>el.classList.remove('bad'),420);
      Flow.toast('它是 '+c.m.deg+' 次，不是 '+this.innerDeg[this.litInner]+' 次',false);
      if(Flow.loseLife())return;
    }
  },
  onPicDone(){this.busy=true;SFX.win();this.ringStep=0;this.turn=Math.round(this.turn/360)*360;this.apply();  // 通关瞬间就近把整张图“咔”地回正
    Flow.addScore(20);const p=this.deck[this.picIndex];
    if(p&&p.src){setTimeout(()=>this.showCele(p),700);}      // 有真图：等回正走完，放大揭晓+题字，点「继续」才进下一张
    else{Flow.toast('拼好一张图！🎉',true);setTimeout(()=>this.advance(),1300);}},
  showCele(p){document.getElementById('celeImg').src=p.src;
    document.getElementById('celeCap').textContent=p.cap||'拼好一张图！';
    document.getElementById('cele').classList.add('show')},
  celeNext(){document.getElementById('cele').classList.remove('show');this.advance()},
  advance(){this.round++;if(this.round>=this.total)Flow.win();else this.newPic()}
};
/* ===== 第2关 · 整式老虎机（看式判对错，符合就确认吐金币） ===== */
const L3={goal:null,coins:0,need:5,busy:false,poly:null,rollTimer:0,_settled:true,
  cn:['','一','二','三','四','五'],
  // 造一项：给定次数 deg 的单项式（deg 0=常数项）
  makeTerm(deg){
    if(deg===0)return makeMono(pick([2,3,4,5,-2,-3,-4,6,7]),[]);
    const pool={1:[[['x',1]],[['y',1]],[['a',1]],[['m',1]],[['b',1]]],
      2:[[['x',2]],[['y',2]],[['a',2]],[['x',1],['y',1]],[['a',1],['b',1]]],
      3:[[['x',3]],[['y',3]],[['x',2],['y',1]],[['a',2],['b',1]]]};
    return makeMono(pick([2,3,4,5,-2,-3,-4,6]),pick(pool[deg]).map(v=>[v[0],v[1]]));
  },
  // 造一个「d次n项式」：最高次恰为 d、其余项次数各不相同且都 <= d、字母部分互不相同（无同类项）
  buildPoly(d,n){
    const degs=[d];const lower=[0,1,2,3].filter(x=>x<d);
    for(let i=0;i<n-1;i++){let dg=pick(lower);
      if(dg===0&&degs.includes(0))dg=pick(lower.filter(x=>x>0));  // 常数项互为同类，最多留一个
      degs.push(dg);}
    // 逐项生成，保证 key 互不相同（不含同类项）
    const used=new Set(),terms=[];
    degs.forEach(dg=>{let t,guard=0;do{t=this.makeTerm(dg);guard++}while(used.has(t.key)&&guard<30);used.add(t.key);terms.push(t)});
    return terms;
  },
  // 造一个「不符合」的整式：随机命中 次数错 / 项数错 两类陷阱
  buildTrap(d,n){
    const kind=pick(['deg','num']);
    if(kind==='deg'){                        // 项数对，最高次不是 d
      let d2;do{d2=pick([2,3])}while(d2===d);return this.buildPoly(d2,n);
    }
    // num：次数对，项数不是 n
    let n2;do{n2=rnd(2,4)}while(n2===n);return this.buildPoly(d,n2);
  },
  // 把若干项拼成一条多项式字符串（+/- 连接）
  polyHtml(terms){return terms.map((t,k)=>{
    const neg=(typeof t.coef==='number')?t.coef<0:/^-/.test(String(t.coef));
    if(k===0)return t.html;
    return neg?' - '+t.html.replace(/^-/,''):' + '+t.html;
  }).join('')},
  // 判断这条式子是否真的符合 goal（d次n项式）：项数=项的个数、次数=最高次、无同类项
  isMatch(terms){
    const keys=terms.map(t=>t.key);
    if(new Set(keys).size!==keys.length)return{ok:false,why:'藏了同类项，合并后其实只有 '+new Set(keys).size+' 项'};
    if(terms.length!==this.goal.n)return{ok:false,why:'项数不对：这是 '+terms.length+' 项，要 '+this.goal.n+' 项'};
    const maxDeg=Math.max(...terms.map(t=>t.deg));
    if(maxDeg!==this.goal.d)return{ok:false,why:'次数不对：最高次是 '+maxDeg+' 次，要 '+this.goal.d+'次'};
    return{ok:true};
  },
  start(){this.coins=0;this.busy=false;this.render();this.newGoal()},
  render(){const b=document.getElementById('board');b.style.gridTemplateColumns='1fr';b.classList.add('boardTop');
    let bulbs='';for(let i=0;i<10;i++){const s=i<5?'left:'+(6+i*20)+'%;top:2px':'left:'+(6+(9-i)*20)+'%;bottom:2px';bulbs+='<i style="'+s+'"></i>';}
    b.innerHTML=`
    <div class="slot" id="slot">
      <div class="slotBody">
        <div class="slotCrown"><div class="slotBulbs">${bulbs}</div>
          <div class="slotTop">目标：<b id="slotGoal">—</b></div></div>
        <div class="slotWin"><div class="slotReel" id="slotReel"></div><div class="slotGlass"></div></div>
        <div class="slotBase">
          <div class="slotCoins" id="slotCoins"><span class="coin"></span> 金币 0 / 5</div>
          <div class="slotBtns">
            <button class="slotBtn ok" onclick="L3.confirm()">✓ 确认</button>
            <button class="slotBtn re" onclick="L3.again()">✕ 淘汰</button>
          </div>
        </div>
      </div>
      <div class="slotArm"><span class="rod"><span class="knob"></span></span><span class="socket"></span></div>
    </div>`;
  },
  updateCoins(bump){const el=document.getElementById('slotCoins');el.innerHTML='<span class="coin"></span> 金币 '+this.coins+' / '+this.need;
    if(bump){el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump')}},
  newGoal(){this.goal={d:pick([2,3]),n:rnd(2,4)};
    document.getElementById('slotGoal').textContent=this.cn[this.goal.d]+'次'+this.cn[this.goal.n]+'项式';
    Flow.banner('整式老虎机','拨动摇杆，屏上摇出一个整式');
    Flow.prog('判断对了才安全：符合按「确认」，不符按「淘汰」');
    this.updateCoins(false);this.spin()},
  // 拨杆下压 + 卷轴竖直滚动：一排候选式子从上往下滚过、减速，停在最终那条
  spin(){this.busy=true;const slot=document.getElementById('slot');slot.classList.add('pull');
    const g=this.goal;this.poly=(pick([1,1,2,2,2])===2)?this.buildTrap(g.d,g.n):this.buildPoly(g.d,g.n);
    const reel=document.getElementById('slotReel');const ROW=132,COUNT=12;
    // 造一条卷轴：第一行是最终结果，其后是随机式子。初始把卷轴上移到末行对齐窗口，
    // 再滚回 translateY(0) —— 视觉上式子从上往下滚落，最终停在第一行
    let rows='<div class="slotRow"><div class="slotPoly">'+this.polyHtml(this.poly)+'</div></div>';
    for(let i=0;i<COUNT-1;i++){const t=this.buildPoly(pick([2,3]),rnd(2,4));rows+='<div class="slotRow"><div class="slotPoly">'+this.polyHtml(t)+'</div></div>';}
    reel.innerHTML=rows;
    // 起始停在末行、加动感模糊，强制回流后再滚到第一行（从上往下、减速停住）
    reel.classList.remove('spin');reel.classList.add('blur');reel.style.transform='translateY(-'+((COUNT-1)*ROW)+'px)';
    void reel.offsetHeight;
    SFX.slide(300,760,.6,'square',.08);
    let ticks=0;clearInterval(this.rollTimer);
    this.rollTimer=setInterval(()=>{SFX.tap();if(++ticks>=6)clearInterval(this.rollTimer)},150);
    reel.classList.add('spin');reel.style.transform='translateY(0)';
    const done=()=>{if(this._settled)return;this._settled=true;reel.removeEventListener('transitionend',done);clearInterval(this.rollTimer);
      reel.classList.remove('blur');SFX.click();slot.classList.remove('pull');this.busy=false};
    this._settled=false;reel.addEventListener('transitionend',done);
    setTimeout(done,1200);   // 兜底：transitionend 万一没触发也能解锁
  },
  // ✓确认：判断“它符合” —— 判对(真符合)得金币；判错(其实不符)扣心
  confirm(){if(this.busy)return;const r=this.isMatch(this.poly);
    if(r.ok){this.busy=true;SFX.right();this.coins++;Flow.addScore(15);this.flyCoin();this.updateCoins(true);
      Flow.toast('符合！得到一枚金币',true);
      setTimeout(()=>{if(this.coins>=this.need){Flow.win()}else{this.newGoal()}},900);
    }else{this.misjudge('看走眼啦——'+r.why)}},
  // ✕淘汰：判断“它不符合” —— 判对(真不符)放行重摇；判错(其实符合)扣心
  again(){if(this.busy)return;const r=this.isMatch(this.poly);
    if(!r.ok){SFX.click();Flow.toast('没错，这个不合格',true);setTimeout(()=>this.spin(),450);}
    else{this.misjudge('它其实是合格的「'+this.goal.d+'次'+this.cn[this.goal.n]+'项式」，别放走啦')}},
  // 判断错误：震动 + 弹出提示，停留到学生点「确定」才继续（扣心也在点确定时结算）
  misjudge(msg){this.busy=true;const slot=document.getElementById('slot');slot.classList.remove('shake');void slot.offsetWidth;slot.classList.add('shake');SFX.wrong();
    document.getElementById('slotDlgMsg').textContent=msg;document.getElementById('slotDlg').classList.add('show')},
  // 点「确定」：关弹窗、扣一颗心，没死则同一目标重摇
  dlgOk(){document.getElementById('slotDlg').classList.remove('show');
    if(Flow.loseLife())return;this.spin()},
  flyCoin(){const slot=document.getElementById('slot');const c=document.createElement('div');c.className='coinFly';slot.appendChild(c);setTimeout(()=>c.remove(),760)}
};
UI.renderMenu();
</script>
